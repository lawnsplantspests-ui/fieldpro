<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FieldPro — Lawns Plants &amp; Pests</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════ CSS RESET & VARIABLES ═══════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1a12;--bg-card:#1a2d1e;--bg-input:#1e3525;--bg-nav:#0b1310;
  --border:#2a4a30;--border-focus:#4a7c59;
  --accent:#4ade80;--accent-dim:#22543d;--accent-dark:#166534;
  --warn:#f59e0b;--warn-bg:#422006;
  --danger:#ef4444;--danger-bg:#450a0a;
  --overdue:#ef4444;
  --text:#e8f0ea;--text-dim:#8aab8d;--text-muted:#5a7a5e;
  --white:#ffffff;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
  --radius:10px;--radius-sm:6px;
}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow:hidden}
input,select,textarea,button{font-family:var(--font-body);font-size:14px}
a{color:var(--accent);text-decoration:none}

/* ═══════ LAYOUT ═══════ */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
header{background:var(--bg-nav);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
header .logo{display:flex;align-items:center;gap:10px}
header .logo img{height:32px;filter:invert(1) brightness(1.5)}
header .logo .divider{width:1px;height:24px;background:var(--border)}
header .logo .app-name{font-size:15px;font-weight:800;color:#c8e6c9;letter-spacing:-0.3px}
header .meta{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
.offline-banner{background:var(--warn-bg);color:var(--warn);text-align:center;padding:4px;font-size:11px;font-weight:700;display:none}
.offline-banner.show{display:block}

.app-body{display:flex;flex:1;overflow:hidden}

/* NAV */
nav{width:170px;background:var(--bg-nav);border-right:1px solid var(--border);padding:8px 6px;flex-shrink:0;overflow-y:auto}
nav button{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;margin-bottom:2px;border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:12px;font-weight:600;border:none;cursor:pointer;text-align:left;transition:all .1s}
nav button:hover{color:var(--text-dim)}
nav button.active{background:var(--accent-dim);color:#c8e6c9}
nav button .emoji{font-size:14px}
nav button .badge{margin-left:auto;background:var(--accent);color:var(--bg);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800}

/* MAIN CONTENT */
main{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
main h1{font-size:21px;font-weight:800;letter-spacing:-0.4px;margin-bottom:14px}
main h2{font-size:15px;font-weight:700;margin:16px 0 8px}

/* ═══════ COMPONENTS ═══════ */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;transition:border-color .12s}
.card.clickable{cursor:pointer}
.card.clickable:hover{border-color:var(--accent)}

.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;flex:1 1 120px;min-width:120px}
.stat-box .label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:4px}
.stat-box .value{font-size:22px;font-weight:800;line-height:1.1}

.badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}

.btn{border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:600;font-size:13px;padding:9px 18px;transition:all .12s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.5;cursor:default}
.btn.primary{background:var(--accent);color:var(--bg)}
.btn.secondary{background:var(--bg-input);color:var(--text);border:1px solid var(--border)}
.btn.danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.btn.success{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(74,222,128,.3)}
.btn.ghost{background:transparent;color:var(--text-dim)}
.btn.sm{padding:5px 10px;font-size:11px}

.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:11px;font-weight:700;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:9px 11px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--border-focus)}
.input-group textarea{min-height:70px;resize:vertical}

.search-bar{position:relative;margin-bottom:14px}
.search-bar input{width:100%;padding:9px 11px 9px 34px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none}
.search-bar::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px}

.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px}

.flex-row{display:flex;gap:8px;align-items:center}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.flex-wrap{flex-wrap:wrap}
.gap-6{gap:6px}
.gap-10{gap:10px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}

/* SERVICE TYPE COLORS */
.svc-lawn{color:#4ade80}.bg-lawn{background:rgba(74,222,128,.1)}
.svc-pest{color:#d97706}.bg-pest{background:rgba(217,119,6,.1)}
.svc-tree{color:#2dd4bf}.bg-tree{background:rgba(45,212,191,.1)}
.svc-mosquito{color:#a78bfa}.bg-mosquito{background:rgba(167,139,250,.1)}
.svc-aquatic{color:#38bdf8}.bg-aquatic{background:rgba(56,189,248,.1)}
.svc-bare{color:#d4a017}.bg-bare{background:rgba(212,160,23,.1)}
.svc-grub{color:#e879f9}.bg-grub{background:rgba(232,121,249,.1)}

/* ROUND STATUS */
.status-dot{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.status-pending{border:2px solid var(--border)}
.status-due{border:2px solid var(--accent)}
.status-overdue{border:2px solid var(--overdue)}
.status-completed{background:rgba(74,222,128,.15);color:var(--accent)}
.status-skipped{background:var(--border);color:var(--text-muted)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding-top:30px;overflow-y:auto}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:24px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal.wide{width:720px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-header h2{font-size:18px;font-weight:800}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer}

/* PROGRESS BAR */
.progress-bar{background:var(--bg-input);border-radius:6px;height:8px;overflow:hidden;margin-bottom:16px}
.progress-bar .fill{background:var(--accent);height:100%;border-radius:6px;transition:width .3s}

/* FILTER PILLS */
.filter-pills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.filter-pills button{padding:5px 10px;font-size:10px;font-weight:600;border-radius:20px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-dim);cursor:pointer;transition:all .1s}
.filter-pills button.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* STOP CARD */
.stop-card{display:flex;align-items:flex-start;gap:12px;border-left:3px solid var(--border);padding-left:12px}
.stop-card.overdue{border-left-color:var(--overdue)}
.stop-card.due{border-left-color:var(--accent)}
.stop-card.completed{border-left-color:var(--accent);opacity:.65}

.stop-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;margin-top:2px}

/* MOBILE RESPONSIVE */
@media(max-width:700px){
  nav{width:56px;padding:8px 4px}
  nav button{padding:8px;justify-content:center}
  nav button span.nav-label{display:none}
  nav button .badge{display:none}
  main{padding:14px}
  main h1{font-size:18px}
  .stat-box{min-width:100px;padding:10px}
  .stat-box .value{font-size:18px}
  .modal{padding:16px;border-radius:10px}
  .grid-2{grid-template-columns:1fr}
  header .meta{display:none}
}
@media(max-width:400px){
  nav{width:48px}
  main{padding:10px}
}

/* HIDDEN PAGES */
.page{display:none}
.page.active{display:block}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header>
    <div class="logo">
      <img id="logo-img" alt="LPP" src="">
      <div class="divider"></div>
      <div class="app-name">FieldPro</div>
    </div>
    <div class="meta" id="header-date"></div>
  </header>
  <div class="offline-banner" id="offline-banner">⚠ Offline — using cached data</div>

  <div class="app-body">
    <!-- NAV -->
    <nav id="nav"></nav>

    <!-- MAIN -->
    <main id="main-content">
      <!-- Pages injected by JS -->
      <div id="page-workboard" class="page"></div>
      <div id="page-routes" class="page"></div>
      <div id="page-customers" class="page"></div>
      <div id="page-programs" class="page"></div>
      <div id="page-products" class="page"></div>
      <div id="page-sync" class="page"></div>
      <div id="page-history" class="page"></div>
    </main>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script>
/* ═══════════════════════════════════════════
   FIELDPRO — Vanilla JS App
   Architecture: Google Sheets → localStorage → Memory
   Same pattern as LPP PDA Log
   ═══════════════════════════════════════════ */

// ══════════ CONFIGURATION ══════════
// REPLACE THESE WITH YOUR ACTUAL VALUES:
const API_URL = 'https://script.google.com/macros/s/AKfycbwXMubOtc75EDldvpRGyF2kbNUi45AgjpxRBDSf2wiKQIsDDeH2vQnw9q2vUUVMpEKh/exec';
const CACHE_KEY = 'fieldpro_cache';
const SETTINGS_KEY = 'fieldpro_settings';

// ══════════ STATE ══════════
let STATE = {
  customers: [],
  services: {},
  programs: [],
  customerPrograms: [],
  routes: [],
  products: [],
  sheetData: [],
  sheetLastSync: null,
};

let currentPage = 'workboard';
let searchTerm = '';
let filterService = 'all';
let detailCustomerId = null;
let detailRouteId = null;

// ══════════ DEFAULT PROGRAMS ══════════
const SERVICE_TYPES = ['Lawn Fert & Weed','Tree & Shrub Care','Perimeter Pest','Interior Pest','Bare Ground','Aquatics','Mosquito Control','Grub Control','Aeration & Seed','Fungicide App'];

const DEFAULT_PROGRAMS = [
  { id:'tpl-full7', name:'Full Lawn Program (7 Round)', rounds:[
    {name:'R1 — Crabgrass Pre-Em + Fert',serviceType:'Lawn Fert & Weed',windowStart:'03-01',windowEnd:'04-15'},
    {name:'R2 — Broadleaf + Fert',serviceType:'Lawn Fert & Weed',windowStart:'04-15',windowEnd:'05-30'},
    {name:'R3 — Grub Preventive + Fert',serviceType:'Grub Control',windowStart:'05-15',windowEnd:'06-30'},
    {name:'R4 — Summer Fert + Broadleaf',serviceType:'Lawn Fert & Weed',windowStart:'06-15',windowEnd:'07-31'},
    {name:'R5 — Late Summer App',serviceType:'Lawn Fert & Weed',windowStart:'08-01',windowEnd:'09-15'},
    {name:'R6 — Fall Fert + Broadleaf',serviceType:'Lawn Fert & Weed',windowStart:'09-15',windowEnd:'10-31'},
    {name:'R7 — Winterizer',serviceType:'Lawn Fert & Weed',windowStart:'10-15',windowEnd:'12-01'},
  ]},
  { id:'tpl-maint4', name:'Maintenance Program (4 Round)', rounds:[
    {name:'R1 — Pre-Em + Fert',serviceType:'Lawn Fert & Weed',windowStart:'03-01',windowEnd:'04-30'},
    {name:'R2 — Broadleaf + Fert',serviceType:'Lawn Fert & Weed',windowStart:'05-01',windowEnd:'06-30'},
    {name:'R3 — Late Summer',serviceType:'Lawn Fert & Weed',windowStart:'07-15',windowEnd:'09-15'},
    {name:'R4 — Winterizer',serviceType:'Lawn Fert & Weed',windowStart:'10-01',windowEnd:'11-30'},
  ]},
  { id:'tpl-pest4', name:'Perimeter Pest (Quarterly)', rounds:[
    {name:'Q1 — Spring Pest',serviceType:'Perimeter Pest',windowStart:'03-01',windowEnd:'03-31'},
    {name:'Q2 — Summer Pest',serviceType:'Perimeter Pest',windowStart:'06-01',windowEnd:'06-30'},
    {name:'Q3 — Fall Pest',serviceType:'Perimeter Pest',windowStart:'09-01',windowEnd:'09-30'},
    {name:'Q4 — Late Fall Pest',serviceType:'Perimeter Pest',windowStart:'11-01',windowEnd:'11-30'},
  ]},
  { id:'tpl-treeshrub', name:'Tree & Shrub (3 Round)', rounds:[
    {name:'R1 — Dormant Oil / Early',serviceType:'Tree & Shrub Care',windowStart:'03-01',windowEnd:'04-15'},
    {name:'R2 — Insect & Disease',serviceType:'Tree & Shrub Care',windowStart:'05-15',windowEnd:'06-30'},
    {name:'R3 — Fall Treatment',serviceType:'Tree & Shrub Care',windowStart:'09-01',windowEnd:'10-15'},
  ]},
  { id:'tpl-mosquito', name:'Mosquito Program (Monthly May–Oct)', rounds:[
    {name:'May Mosquito',serviceType:'Mosquito Control',windowStart:'05-01',windowEnd:'05-31'},
    {name:'Jun Mosquito',serviceType:'Mosquito Control',windowStart:'06-01',windowEnd:'06-30'},
    {name:'Jul Mosquito',serviceType:'Mosquito Control',windowStart:'07-01',windowEnd:'07-31'},
    {name:'Aug Mosquito',serviceType:'Mosquito Control',windowStart:'08-01',windowEnd:'08-31'},
    {name:'Sep Mosquito',serviceType:'Mosquito Control',windowStart:'09-01',windowEnd:'09-30'},
    {name:'Oct Mosquito',serviceType:'Mosquito Control',windowStart:'10-01',windowEnd:'10-31'},
  ]},
  { id:'tpl-aquatic', name:'Aquatics Program (Monthly Apr–Oct)', rounds:[
    {name:'Apr Aquatic — Early Season',serviceType:'Aquatics',windowStart:'04-01',windowEnd:'04-30'},
    {name:'May Aquatic',serviceType:'Aquatics',windowStart:'05-01',windowEnd:'05-31'},
    {name:'Jun Aquatic',serviceType:'Aquatics',windowStart:'06-01',windowEnd:'06-30'},
    {name:'Jul Aquatic',serviceType:'Aquatics',windowStart:'07-01',windowEnd:'07-31'},
    {name:'Aug Aquatic',serviceType:'Aquatics',windowStart:'08-01',windowEnd:'08-31'},
    {name:'Sep Aquatic',serviceType:'Aquatics',windowStart:'09-01',windowEnd:'09-30'},
    {name:'Oct Aquatic — Late Season',serviceType:'Aquatics',windowStart:'10-01',windowEnd:'10-31'},
  ]},
];

// ══════════ UTILITIES ══════════
const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);
const todayStr = () => new Date().toISOString().split('T')[0];
const currentYear = new Date().getFullYear();
const windowToDate = (mmdd) => currentYear + '-' + mmdd;
const isOverdue = (wEnd) => todayStr() > windowToDate(wEnd);
const isDue = (wStart, wEnd) => { const t = todayStr(); return t >= windowToDate(wStart) && t <= windowToDate(wEnd); };
const isUpcoming = (wStart) => todayStr() < windowToDate(wStart);

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function fmtDateFull(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function svcColorClass(svc) {
  if (!svc) return 'svc-lawn';
  const s = svc.toLowerCase();
  if (s.includes('lawn') || s.includes('fert')) return 'svc-lawn';
  if (s.includes('pest')) return 'svc-pest';
  if (s.includes('tree') || s.includes('shrub')) return 'svc-tree';
  if (s.includes('mosquito')) return 'svc-mosquito';
  if (s.includes('aquatic')) return 'svc-aquatic';
  if (s.includes('bare')) return 'svc-bare';
  if (s.includes('grub')) return 'svc-grub';
  return 'svc-lawn';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ══════════ API LAYER (Same pattern as LPP) ══════════
function api(payload, onSuccess, onError) {
  if (!API_URL) {
    // No API configured — use localStorage only
    if (onError) onError('No API URL configured. Using local storage only.');
    return;
  }
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' }, // Critical — no CORS preflight
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(t => {
    const d = JSON.parse(t);
    if (d.status === 'ok') onSuccess(d);
    else if (onError) onError(d.message || 'API error');
  })
  .catch(err => { if (onError) onError(err.message || 'Network error'); });
}

// ══════════ PERSISTENCE ══════════
function saveToCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(STATE)); } catch(e) {}
}

function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const cached = JSON.parse(raw);
      STATE.customers = cached.customers || [];
      STATE.services = cached.services || {};
      STATE.programs = cached.programs || (DEFAULT_PROGRAMS.map(p => ({...p})));
      STATE.customerPrograms = cached.customerPrograms || [];
      STATE.routes = cached.routes || [];
      STATE.products = cached.products || [];
      STATE.sheetData = cached.sheetData || [];
      STATE.sheetLastSync = cached.sheetLastSync || null;
    } else {
      STATE.programs = DEFAULT_PROGRAMS.map(p => ({...p, rounds: p.rounds.map(r => ({...r}))}));
    }
  } catch(e) {
    STATE.programs = DEFAULT_PROGRAMS.map(p => ({...p, rounds: p.rounds.map(r => ({...r}))}));
  }
}

function loadAll() {
  // Load from cache first for instant UI
  loadFromCache();
  renderCurrentPage();

  // Then try API
  api({ action: 'fpGetAll' },
    function(d) {
      // Merge customers from shared Customers tab
      if (d.customers) STATE.customers = d.customers;
      // Services from existing Services tab (JSON blob with product definitions)
      if (d.services) STATE.services = d.services;
      // FieldPro-specific data
      if (d.programs && d.programs.length) STATE.programs = d.programs;
      if (d.customerPrograms) STATE.customerPrograms = d.customerPrograms;
      if (d.routes) STATE.routes = d.routes;
      if (d.products) STATE.products = d.products;
      saveToCache();
      renderCurrentPage();
      document.getElementById('offline-banner').classList.remove('show');
      console.log('FieldPro loaded:', STATE.customers.length, 'customers,', Object.keys(STATE.services || {}).length, 'services');
    },
    function(err) {
      console.log('Using cached data:', err);
      document.getElementById('offline-banner').classList.add('show');
    }
  );
}

function saveState() {
  saveToCache();
  // Fire API save in background
  api({ action: 'fpSaveAll', data: {
    programs: STATE.programs,
    customerPrograms: STATE.customerPrograms,
    routes: STATE.routes,
    products: STATE.products,
  }}, function(){}, function(err){ console.warn('Save to API failed:', err); });
}

// ══════════ NAVIGATION ══════════
const NAV_ITEMS = [
  { key:'workboard', label:'Work Board', emoji:'📋' },
  { key:'routes', label:'Routes', emoji:'🗺️' },
  { key:'customers', label:'Customers', emoji:'👥' },
  { key:'programs', label:'Programs', emoji:'📑' },
  { key:'products', label:'Products', emoji:'🧪' },
  { key:'sync', label:'Sync', emoji:'🔄' },
  { key:'history', label:'History', emoji:'📜' },
];

function renderNav() {
  const nav = document.getElementById('nav');
  const dueCount = getWorkboardItems().filter(i => i.due).length;
  nav.innerHTML = NAV_ITEMS.map(n => `
    <button class="${currentPage === n.key ? 'active' : ''}" onclick="navigateTo('${n.key}')">
      <span class="emoji">${n.emoji}</span>
      <span class="nav-label">${n.label}</span>
      ${n.key === 'workboard' && dueCount > 0 ? `<span class="badge">${dueCount}</span>` : ''}
    </button>
  `).join('');
}

function navigateTo(page) {
  currentPage = page;
  searchTerm = '';
  filterService = 'all';
  detailCustomerId = null;
  detailRouteId = null;
  renderNav();
  renderCurrentPage();
}

function renderCurrentPage() {
  // Hide all pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + currentPage);
  if (el) {
    el.classList.add('active');
    // Render page content
    switch(currentPage) {
      case 'workboard': renderWorkboard(); break;
      case 'routes': renderRoutes(); break;
      case 'customers': renderCustomers(); break;
      case 'programs': renderPrograms(); break;
      case 'products': renderProducts(); break;
      case 'sync': renderSync(); break;
      case 'history': renderHistory(); break;
    }
  }
  renderNav();
}

// ══════════ WORKBOARD ══════════
function getWorkboardItems() {
  const items = [];
  STATE.customerPrograms.forEach(cp => {
    const cust = STATE.customers.find(c => c.id === cp.customerId || c.ID === cp.customerId);
    if (!cust) return;
    cp.rounds.forEach((r, idx) => {
      if (r.status === 'completed' || r.status === 'skipped') return;
      const due = isDue(r.windowStart, r.windowEnd);
      const over = isOverdue(r.windowEnd);
      const upcoming = isUpcoming(r.windowStart);
      const custName = cust.Name || cust.name || '';
      const custAddr = cust.Address || cust.address || '';
      const custId = cust.ID || cust.id;
      const turfSqft = cust.SqFt_Lawn || cust.turfSqft || '';
      items.push({
        ...r, cpId:cp.id, roundIdx:idx, customerId:custId, customerName:custName,
        customerAddress:custAddr, turfSqft, programName:cp.programName,
        due, overdue:over, upcoming, sortKey: over?0:due?1:2,
        windowStartFull:windowToDate(r.windowStart), windowEndFull:windowToDate(r.windowEnd)
      });
    });
  });
  items.sort((a,b) => a.sortKey-b.sortKey || a.windowStartFull.localeCompare(b.windowStartFull) || a.customerName.localeCompare(b.customerName));
  return items;
}

function renderWorkboard() {
  const items = getWorkboardItems();
  // Also get completed counts per service for stats
  const allRounds = [];
  STATE.customerPrograms.forEach(cp => {
    cp.rounds.forEach(r => { allRounds.push(r); });
  });

  let filtered = items;
  if (filterService !== 'all') filtered = filtered.filter(i => i.serviceType === filterService);
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(i => i.customerName.toLowerCase().includes(s) || i.name.toLowerCase().includes(s) || i.serviceType.toLowerCase().includes(s));
  }

  const overdueItems = filtered.filter(i => i.overdue);
  const dueItems = filtered.filter(i => i.due && !i.overdue);
  const upcomingItems = filtered.filter(i => i.upcoming);

  // Per-service stats
  const svcStats = {};
  SERVICE_TYPES.forEach(s => { svcStats[s] = { total: 0, completed: 0, pending: 0 }; });
  STATE.customerPrograms.forEach(cp => {
    cp.rounds.forEach(r => {
      if (svcStats[r.serviceType]) {
        svcStats[r.serviceType].total++;
        if (r.status === 'completed') svcStats[r.serviceType].completed++;
        else if (r.status === 'pending') svcStats[r.serviceType].pending++;
      }
    });
  });

  document.getElementById('page-workboard').innerHTML = `
    <h1>Work Board</h1>
    <div class="stat-row">
      <div class="stat-box"><div class="label">Overdue</div><div class="value" style="color:var(--overdue)">${items.filter(i=>i.overdue).length}</div></div>
      <div class="stat-box"><div class="label">Due Now</div><div class="value" style="color:var(--accent)">${items.filter(i=>i.due).length}</div></div>
      <div class="stat-box"><div class="label">Upcoming</div><div class="value" style="color:var(--text-dim)">${items.filter(i=>i.upcoming).length}</div></div>
      <div class="stat-box"><div class="label">Customers</div><div class="value">${STATE.customers.length}</div></div>
    </div>
    <div class="search-bar"><input placeholder="Filter by customer, round, service..." value="${escHtml(searchTerm)}" oninput="searchTerm=this.value;renderWorkboard()"></div>
    <div class="filter-pills">
      <button class="${filterService==='all'?'active':''}" onclick="filterService='all';renderWorkboard()">All</button>
      ${SERVICE_TYPES.filter(s => svcStats[s].total > 0).map(s => {
        const st = svcStats[s];
        return `<button class="${filterService===s?'active':''}" onclick="filterService='${s}';renderWorkboard()">${s} <span style="opacity:.7;font-size:9px">${st.completed}/${st.total}</span></button>`;
      }).join('')}
    </div>
    ${overdueItems.length ? `<div class="section-label" style="color:var(--overdue)">⚠ Overdue (${overdueItems.length})</div>${overdueItems.map(i => workCardHtml(i,'overdue')).join('')}` : ''}
    ${dueItems.length ? `<div class="section-label" style="color:var(--accent)">● Due Now (${dueItems.length})</div>${dueItems.map(i => workCardHtml(i,'due')).join('')}` : ''}
    ${upcomingItems.length ? `<div class="section-label" style="color:var(--text-muted)">Upcoming (${upcomingItems.length})</div>${upcomingItems.slice(0,30).map(i => workCardHtml(i,'')).join('')}` : ''}
    ${filtered.length === 0 ? '<div class="card"><p style="color:var(--text-dim)">No pending work. Assign programs to customers to populate the work board.</p></div>' : ''}
  `;
}

function workCardHtml(item, statusClass) {
  return `
    <div class="card stop-card ${statusClass}">
      <div style="flex:1;min-width:0">
        <div class="flex-row gap-6 mb-8">
          <span style="font-weight:700;font-size:14px;cursor:pointer;text-decoration:underline;text-decoration-color:var(--border)" onclick="detailCustomerId='${item.customerId}';navigateTo('customers')">${escHtml(item.customerName)}</span>
          <span class="badge ${svcColorClass(item.serviceType)}" style="background:currentColor;color:var(--bg);opacity:.8">${escHtml(item.serviceType)}</span>

        </div>
      </div>
      <div class="flex-row gap-6" style="flex-shrink:0">
        <button class="btn sm success" onclick="completeRound('${item.cpId}',${item.roundIdx})">✓ Done</button>
        <button class="btn sm ghost" onclick="skipRound('${item.cpId}',${item.roundIdx})">Skip</button>

  `;
}

function completeRound(cpId, roundIdx) {
  const cp = STATE.customerPrograms.find(c => c.id === cpId);
  if (!cp) return;
  cp.rounds[roundIdx].status = 'completed';
  cp.rounds[roundIdx].completedDate = todayStr();
  saveState();
  renderCurrentPage();
}

function skipRound(cpId, roundIdx) {
  const cp = STATE.customerPrograms.find(c => c.id === cpId);
  if (!cp) return;
  cp.rounds[roundIdx].status = 'skipped';
  saveState();
  renderCurrentPage();
}

          const due = r.status === 'pending' && isDue(r.windowStart, r.windowEnd);
          return `
            <div class="flex-row gap-10" style="padding:7px 0;${idx > 0 ? 'border-top:1px solid var(--border)' : ''}">

function deleteCustomer(cid) {
  if (!confirm('Delete this customer and all their programs?')) return;
  STATE.customers = STATE.customers.filter(c => (c.ID||c.customerId||c.id) !== cid);
  STATE.customerPrograms = STATE.customerPrograms.filter(cp => cp.customerId !== cid);
  saveState();
  detailCustomerId = null;
  renderCustomers();
}

function removeCustomerProgram(cpId) {
  if (!confirm('Remove this program?')) return;
  STATE.customerPrograms = STATE.customerPrograms.filter(cp => cp.id !== cpId);
  saveState();
  renderCurrentPage();
}

function assignProgram(customerId, programId) {
  const prog = STATE.programs.find(p => p.id === programId);
  if (!prog) return;
  STATE.customerPrograms.push({
    id: uid(), customerId, programId, programName: prog.name, year: currentYear,
    rounds: prog.rounds.map(r => ({...r, status:'pending', completedDate:null}))
  });
  saveState();
  closeModal();
  renderCurrentPage();
}

// ══════════ PRODUCTS ══════════
function renderProducts() {
  // Build a flat list from the Services JSON blob (from LPP) + any FP_Products
  let allItems = [];

  // Parse LPP Services data — each service has a products array
  if (STATE.services && typeof STATE.services === 'object') {
    Object.keys(STATE.services).forEach(svcName => {
      const svc = STATE.services[svcName];
      if (svc.products && Array.isArray(svc.products)) {
        svc.products.forEach(p => {
          // Avoid duplicates by product name
          if (!allItems.find(x => x.name === p.product)) {
            allItems.push({
              id: 'svc-' + (p.product||'').replace(/\s+/g,'-').toLowerCase().slice(0,30),
              name: p.product || '',
              activeIngredient: p.activeIng || '',
              epaReg: p.epa || '',
              targetRate: p.rate || '',
              method: p.method || '',
              targetPest: p.targetPest || '',
              category: svcName.split(' - ')[0] || '',
              source: 'lpp',
            });
          }
        });
      }
    });
  }

  // Add any manually-added FP products
  STATE.products.forEach(p => {
    if (!allItems.find(x => x.name === p.name)) {
      allItems.push({ ...p, source: 'fp' });
    }
  });

  // Filter by search
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    allItems = allItems.filter(p => (p.name||'').toLowerCase().includes(s) || (p.activeIngredient||'').toLowerCase().includes(s) || (p.targetPest||'').toLowerCase().includes(s) || (p.category||'').toLowerCase().includes(s));
  }

  // Sort by name
  allItems.sort((a,b) => (a.name||'').localeCompare(b.name||''));

  document.getElementById('page-products').innerHTML = `
    <div class="flex-between mb-16">
      <h1 style="margin:0">Products & Chemicals <span style="font-size:15px;color:var(--text-dim);font-weight:500">(${allItems.length})</span></h1>
      <button class="btn primary" onclick="showProductForm()">+ Add Product</button>
    </div>
    <div class="search-bar"><input placeholder="Search products, ingredients, pests..." value="${escHtml(searchTerm)}" oninput="searchTerm=this.value;renderProducts()"></div>
    ${allItems.map(p => `
      <div class="card" style="margin-bottom:8px">
        <div class="flex-row gap-10">
          <div style="width:36px;height:36px;border-radius:8px;background:rgba(167,139,250,.1);color:#a78bfa;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">🧪</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px">${escHtml(p.name)}</div>
            <div style="font-size:12px;color:var(--text-dim)">${p.epaReg && p.epaReg !== 'N/A' ? 'EPA# ' + escHtml(p.epaReg) + ' · ' : ''}${escHtml(p.activeIngredient||'')}</div>
            ${p.targetRate ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">Rate: ${escHtml(p.targetRate)}</div>` : ''}
            ${p.targetPest && p.targetPest !== 'N/A — Fertility' ? `<div style="font-size:11px;color:var(--text-muted)">Target: ${escHtml(p.targetPest)}</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <span class="badge" style="background:var(--bg-input);color:var(--text-dim);font-size:9px">${escHtml(p.category||'—')}</span>
            ${p.source === 'lpp' ? '<div style="font-size:9px;color:var(--text-muted);margin-top:4px">from LPP</div>' : ''}
          </div>
          ${p.source === 'fp' ? `<button class="btn ghost sm" onclick="showProductForm('${p.id}')">Edit</button><button class="btn danger sm" onclick="deleteProduct('${p.id}')">Del</button>` : ''}
        </div>
        ${p.method ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${escHtml(p.method)}</div>` : ''}
      </div>
    `).join('')}
    ${allItems.length === 0 ? '<div class="card"><p style="color:var(--text-dim)">No products found. Your LPP Services data may still be loading.</p></div>' : ''}
  `;
}

function deleteProduct(id) {
  if (!confirm('Delete product?')) return;
  STATE.products = STATE.products.filter(p => p.id !== id);
  saveState();
  renderProducts();
}

// ══════════ ROUTES ══════════

function completeRouteStop(routeId, stopIdx) {
  const rt = STATE.routes.find(r => r.id === routeId);
  if (!rt) return;
  rt.stops[stopIdx].status = 'completed';
  rt.stops[stopIdx].completedDate = todayStr();
  // Also complete the underlying round
  const stop = rt.stops[stopIdx];
  if (stop.cpId && stop.roundIdx != null) {
    completeRound(stop.cpId, stop.roundIdx);
  }
  saveState();
  renderRoutes();
}

function undoRouteStop(routeId, stopIdx) {
  const rt = STATE.routes.find(r => r.id === routeId);
  if (!rt) return;
  rt.stops[stopIdx].status = 'pending';
  rt.stops[stopIdx].completedDate = null;
  saveState();
  renderRoutes();
}

function deleteRoute(id) {
  if (!confirm('Delete this route?')) return;
  STATE.routes = STATE.routes.filter(r => r.id !== id);
  saveState();
  detailRouteId = null;
  renderRoutes();
}

function openInAppleMaps(routeId) {
  const rt = STATE.routes.find(r => r.id === routeId);
  if (!rt || !rt.stops || rt.stops.length === 0) { alert('No stops in this route.'); return; }
  // Get pending stops with addresses
  const pendingStops = rt.stops.filter(s => s.status !== 'completed' && s.address);
  if (pendingStops.length === 0) { alert('No pending stops with addresses.'); return; }
  // Apple Maps URL with multiple waypoints
  // Format: maps.apple.com/?daddr=addr1&daddr=addr2...
  const addresses = pendingStops.map(s => encodeURIComponent(s.address));
  if (addresses.length === 1) {
    window.open('https://maps.apple.com/?daddr=' + addresses[0], '_blank');
  } else {
    // Apple Maps supports waypoints via Google Maps URL scheme on iOS
    // Use Google Maps URL which iOS will offer to open in Apple Maps
    const origin = addresses[0];
    const dest = addresses[addresses.length - 1];
    const waypoints = addresses.slice(1, -1).join('|');
    let url = 'https://www.google.com/maps/dir/' + pendingStops.map(s => encodeURIComponent(s.address)).join('/');
    window.open(url, '_blank');
  }
}

function renderSync() {
  const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
  // Auto-fill sync URL from API_URL if not set
  const syncUrl = settings.syncUrl || API_URL || '';
  document.getElementById('page-sync').innerHTML = `
    <h1>Treatment Sync</h1>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Sync your LPP App Log to automatically verify and complete treatments in FieldPro.</p>
    <div class="card mb-16">

      <div class="input-group"><label>API URL</label><input id="sync-url" value="${escHtml(syncUrl)}" placeholder="https://script.google.com/macros/s/.../exec"></div>
      <div style="margin-bottom:12px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="sync-all" ${settings.syncAll ? 'checked' : ''} style="width:16px;height:16px;accent-color:var(--accent)">
          <span style="font-weight:600">Fetch all months</span>
          <span style="font-size:11px;color:var(--text-muted)">(uncheck for current + last month only)</span>
        </label>
      </div>
      <button class="btn primary" onclick="doSync()" style="width:100%;padding:14px;font-size:15px">🔄 Sync Now</button>
      ${STATE.sheetLastSync ? `<div style="font-size:11px;color:var(--text-muted);margin-top:8px">Last sync: ${new Date(STATE.sheetLastSync).toLocaleString()} · ${STATE.sheetData.length} records</div>` : ''}
    </div>
    <div class="card mb-16">
      <div class="section-label" style="margin-top:0">📄 Manual CSV Upload</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Or upload a CSV export from your LPP Sheet.</p>
      <input type="file" accept=".csv" onchange="handleCsvUpload(this)" style="font-size:13px">
    </div>
    <div id="sync-results"></div>
  `;
  if (STATE.sheetData.length > 0) renderSyncResults();
}

function doSync() {
  const url = document.getElementById('sync-url')?.value?.trim();
  const fetchAll = document.getElementById('sync-all')?.checked;
  if (!url) { alert('Enter your Apps Script URL first.'); return; }

  // Save settings
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({ syncUrl: url, syncAll: fetchAll }));

  // Use POST with fpSyncLog action (same CORS-safe pattern as LPP)
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'fpSyncLog', fetchAll: fetchAll })
  })
    .then(r => r.text())
    .then(t => {
      const json = JSON.parse(t);
      if (json.status !== 'ok') { alert('API error: ' + (json.message||json.error||'Unknown')); return; }
      STATE.sheetData = json.records || [];
      STATE.sheetLastSync = json.synced || new Date().toISOString();

      // Auto-complete matching rounds
      let autoCompleted = 0;
      STATE.sheetData.forEach(row => {
        const custId = (row['Customer']||'').trim();
        const sheetDate = (row['Date']||'').trim();
        const sheetService = (row['Service']||'').trim();
        const fpCust = STATE.customers.find(c => (c.ID||c.customerId||'').toString() === custId);
        if (!fpCust) return;
        const fpCustId = fpCust.ID || fpCust.customerId || fpCust.id;
        let bestMatch = null, bestScore = 0;
        STATE.customerPrograms.forEach(cp => {
          if (cp.customerId !== fpCustId) return;
          cp.rounds.forEach((r, rIdx) => {
            if (r.status !== 'pending') return;
            let score = 0;
            const svcL = r.serviceType.toLowerCase();
            const sheetSvcL = sheetService.toLowerCase();
            if (svcL.includes(sheetSvcL.slice(0,4)) || sheetSvcL.includes(svcL.slice(0,4))) score += 2;
            if (sheetDate) {
              if (sheetDate >= windowToDate(r.windowStart) && sheetDate <= windowToDate(r.windowEnd)) score += 3;
            }
            score += 1;
            if (score > bestScore) { bestScore = score; bestMatch = { cpId:cp.id, roundIdx:rIdx, date:sheetDate }; }
          });
        });
        if (bestMatch && bestScore >= 4) {
          completeRound(bestMatch.cpId, bestMatch.roundIdx);
          autoCompleted++;
        }
      });

      saveState();
      renderSync();
      if (autoCompleted > 0) alert('Synced! Auto-completed ' + autoCompleted + ' rounds.');
      else alert('Synced ' + STATE.sheetData.length + ' records. No new rounds to auto-complete.');
    })
    .catch(err => alert('Failed to connect: ' + err.message));
}

function handleCsvUpload(input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { alert('No data found.'); return; }
    const parseLine = (line) => { const r=[]; let c='',q=false; for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;} r.push(c.trim()); return r; };
    const hdrs = parseLine(lines[0]);
    const rows = lines.slice(1).map(l => { const v=parseLine(l); const o={}; hdrs.forEach((h,i)=>{o[h]=v[i]||'';}); return o; }).filter(r => Object.values(r).some(v=>v));
    STATE.sheetData = rows;
    STATE.sheetLastSync = new Date().toISOString();
    saveState();
    renderSync();
  };
  reader.readAsText(file);
}

function renderSyncResults() {
  // Basic stats display
  const el = document.getElementById('sync-results');
  if (!el) return;
  el.innerHTML = `

    </div>

  `;
}

function showProductForm(editId) {
  const p = editId ? STATE.products.find(x => x.id === editId) : {};
  showModal(editId ? 'Edit Product' : 'New Product', `
    <div class="input-group"><label>Product Name *</label><input id="pf-name" value="${escHtml(p?.name||'')}"></div>
    <div class="grid-2">
      <div class="input-group"><label>EPA Reg #</label><input id="pf-epa" value="${escHtml(p?.epaReg||'')}"></div>
      <div class="input-group"><label>Active Ingredient</label><input id="pf-ai" value="${escHtml(p?.activeIngredient||'')}"></div>
      <div class="input-group"><label>Target Rate</label><input id="pf-rate" value="${escHtml(p?.targetRate||'')}" placeholder="e.g., 3 oz/1000 sqft"></div>
      <div class="input-group"><label>Category</label>
        <select id="pf-cat">
          <option value="">—</option>
          ${['Herbicide','Insecticide','Fungicide','Fertilizer','Growth Regulator','Surfactant','Adjuvant','Other'].map(c => `<option ${(p?.category||'')===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="input-group"><label>Notes</label><textarea id="pf-notes">${escHtml(p?.notes||'')}</textarea></div>

function saveProduct(editId) {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) { alert('Name required.'); return; }
  const data = {
    name,
    epaReg: document.getElementById('pf-epa').value.trim(),
    activeIngredient: document.getElementById('pf-ai').value.trim(),
    targetRate: document.getElementById('pf-rate').value.trim(),
    category: document.getElementById('pf-cat').value,
    notes: document.getElementById('pf-notes').value,
  };
  if (editId) {
    const idx = STATE.products.findIndex(p => p.id === editId);
    if (idx >= 0) STATE.products[idx] = { ...STATE.products[idx], ...data };
  } else {
    data.id = uid();
    STATE.products.push(data);
  }
  saveState();
  closeModal();
  renderProducts();
}

// ── Program Form ──
function showProgramForm(editId) {
  const prog = editId ? STATE.programs.find(p => p.id === editId) : { name:'', rounds:[{name:'',serviceType:SERVICE_TYPES[0],windowStart:'03-01',windowEnd:'04-30'}] };
  window._editRounds = prog.rounds.map(r => ({...r}));

  function renderRoundsEditor() {
    return window._editRounds.map((r,i) => `
      <div style="display:flex;gap:6px;align-items:flex-end;margin-bottom:8px;padding:10px;background:var(--bg-input);border-radius:8px">
        <div style="flex:3" class="input-group"><label>${i===0?'Round Name':''}</label><input value="${escHtml(r.name)}" onchange="window._editRounds[${i}].name=this.value"></div>
        <div style="flex:2" class="input-group"><label>${i===0?'Service Type':''}</label>
          <select onchange="window._editRounds[${i}].serviceType=this.value">${SERVICE_TYPES.map(s => `<option ${r.serviceType===s?'selected':''}>${s}</option>`).join('')}</select>
        </div>
        <div style="flex:1" class="input-group"><label>${i===0?'Start':''}</label><input value="${escHtml(r.windowStart)}" onchange="window._editRounds[${i}].windowStart=this.value" placeholder="03-01"></div>
        <div style="flex:1" class="input-group"><label>${i===0?'End':''}</label><input value="${escHtml(r.windowEnd)}" onchange="window._editRounds[${i}].windowEnd=this.value" placeholder="04-30"></div>
        <button class="btn danger sm" style="margin-bottom:14px" onclick="window._editRounds.splice(${i},1);document.getElementById('rounds-editor').innerHTML=renderRoundsHtml()">✕</button>
      </div>
    `).join('');
  }
  window.renderRoundsHtml = renderRoundsEditor;

  showModal(editId ? 'Edit Program' : 'New Program', `
    <div class="input-group"><label>Program Name *</label><input id="pgf-name" value="${escHtml(prog.name)}" placeholder="e.g., Full Lawn Program (7 Round)"></div>
    <div class="section-label">Rounds</div>
    <div id="rounds-editor">${renderRoundsEditor()}</div>
    <button class="btn secondary sm" onclick="window._editRounds.push({name:'R'+(window._editRounds.length+1),serviceType:'${SERVICE_TYPES[0]}',windowStart:'03-01',windowEnd:'04-30'});document.getElementById('rounds-editor').innerHTML=renderRoundsHtml()" style="margin-bottom:16px">+ Add Round</button>
    <div class="flex-row gap-6" style="justify-content:flex-end">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveProgram('${editId||''}')">Save</button>
    </div>
  `, true);
}

function saveProgram(editId) {
  const name = document.getElementById('pgf-name').value.trim();
  if (!name) { alert('Name required.'); return; }
  if (!window._editRounds.length) { alert('Add at least one round.'); return; }
  if (editId) {
    const idx = STATE.programs.findIndex(p => p.id === editId);
    if (idx >= 0) { STATE.programs[idx].name = name; STATE.programs[idx].rounds = window._editRounds; }
  } else {
    STATE.programs.push({ id: uid(), name, rounds: window._editRounds });
  }
  saveState();
  closeModal();
  renderPrograms();
}

function showBuildRoute() {
  const items = getWorkboardItems().filter(i => i.due || i.overdue);
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr = tomorrow.toISOString().split('T')[0];

  showModal('Build Route — Select Stops', `
    <div class="flex-row gap-10 mb-16" style="flex-wrap:wrap;align-items:flex-end">
      <div class="input-group"><label>Route Date</label><input type="date" id="br-date" value="${tomorrowStr}"></div>
    </div>
    <div class="flex-between mb-8">
      <span style="font-size:13px;color:var(--text-dim)">${items.length} due items available</span>
      <button class="btn ghost sm" onclick="document.querySelectorAll('.br-check').forEach(c=>c.checked=!c.checked)">Toggle All</button>
    </div>
    <div style="max-height:350px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:16px">
      ${items.map((item,i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)">
          <input type="checkbox" class="br-check" data-idx="${i}" checked style="width:18px;height:18px;accent-color:var(--accent)">
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${escHtml(item.customerName)}</div>
            <div style="font-size:11px;color:var(--text-dim)">${escHtml(item.customerAddress||'No address')} · ${escHtml(item.name)}</div>
          </div>
          <span class="badge ${svcColorClass(item.serviceType)}" style="font-size:9px">${escHtml(item.serviceType)}</span>
        </div>
      `).join('')}
      ${items.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text-dim)">No due work found.</div>' : ''}
    </div>
    <div class="flex-row gap-6" style="justify-content:flex-end">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="buildRouteFromSelection()">Build Route</button>
    </div>
  `, true);

  window._brItems = items;
}

function buildRouteFromSelection() {
  const checks = document.querySelectorAll('.br-check:checked');
  const date = document.getElementById('br-date').value;
  const stops = [];

  checks.forEach(chk => {
    const idx = parseInt(chk.dataset.idx);
    const item = window._brItems[idx];
    if (!item) return;
    stops.push({
      customerId: item.customerId, customerName: item.customerName,
      address: item.customerAddress || '', cpId: item.cpId, roundIdx: item.roundIdx,
      roundName: item.name, serviceType: item.serviceType, status: 'pending'
    });
  });

  if (stops.length === 0) { alert('Select at least one stop.'); return; }

  // Sort by zip code proximity
  stops.sort((a,b) => {
    const zipA = (a.address.match(/(\d{5})/) || ['','99999'])[1];
    const zipB = (b.address.match(/(\d{5})/) || ['','99999'])[1];
    return zipA.localeCompare(zipB) || a.address.localeCompare(b.address);
  });

  const route = {
    id: uid(), name: fmtDate(date) + ' Route', date, serviceFilter: 'Mixed',
    stops, createdAt: todayStr()
  };
  STATE.routes.push(route);
  saveState();
  closeModal();
  detailRouteId = route.id;
  navigateTo('routes');
}

function showCsvImport() {
  showModal('Import Customers from CSV', `
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:14px">Upload a CSV with columns like: ID, Name, Address, Phone, Email, SqFt_Lawn, SqFt_PHC, SqFt_Pest, SqFt_Aquatic</p>
    <div class="input-group"><label>Upload CSV</label><input type="file" accept=".csv" id="csv-file" style="font-size:13px"></div>
    <div class="flex-row gap-6" style="justify-content:flex-end">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="processCsvImport()">Import</button>
    </div>
  `);
}

function processCsvImport() {
  const file = document.getElementById('csv-file')?.files?.[0];
  if (!file) { alert('Select a file.'); return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { alert('No data.'); return; }
    const parseLine = (line) => { const r=[]; let c='',q=false; for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;} r.push(c.trim()); return r; };
    const hdrs = parseLine(lines[0]);
    let imported = 0;
    for (let i = 1; i < lines.length; i++) {
      const vals = parseLine(lines[i]);
      if (!vals.some(v => v)) continue;
      const row = {};
      hdrs.forEach((h,idx) => { row[h] = vals[idx] || ''; });
      const cust = {
        ID: row.ID || row.id || row['Customer ID'] || Date.now().toString() + i,
        Name: row.Name || row.name || row.Customer || '',
        Address: row.Address || row.address || '',
        Phone: row.Phone || row.phone || '',
        Email: row.Email || row.email || '',
        SqFt_Lawn: row.SqFt_Lawn || row['Turf Sq Ft'] || row.turfSqft || '',
        SqFt_PHC: row.SqFt_PHC || row['Beds Sq Ft'] || row.bedsSqft || '',
        SqFt_Pest: row.SqFt_Pest || row['Perimeter Lin Ft'] || row.perimeterLf || '',
        SqFt_Aquatic: row.SqFt_Aquatic || row['Pond/Aquatic Sq Ft'] || row.pondArea || '',
        UpdatedAt: new Date().toISOString(),
      };
      cust.customerId = cust.ID;
      cust.name = cust.Name;
      cust.address = cust.Address;
      cust.phone = cust.Phone;
      cust.email = cust.Email;
      if (cust.Name) { STATE.customers.push(cust); imported++; }
    }
    saveState();
    closeModal();
    alert('Imported ' + imported + ' customers.');
    renderCustomers();
  };
  reader.readAsText(file);
}
