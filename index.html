// ══════════ UTILITIES ══════════
const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);
const todayStr = () => new Date().toISOString().split('T')[0];
const currentYear = new Date().getFullYear();
const windowToDate = (mmdd) => currentYear + '-' + mmdd;
const isOverdue = (wEnd) => todayStr() > windowToDate(wEnd);
const isDue = (wStart, wEnd) => { const t = todayStr(); return t >= windowToDate(wStart) && t <= windowToDate(wEnd); };
const isUpcoming = (wStart) => todayStr() < windowToDate(wStart);

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function fmtDateFull(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function svcColorClass(svc) {
  if (!svc) return 'svc-lawn';
  const s = svc.toLowerCase();
  if (s.includes('lawn') || s.includes('fert')) return 'svc-lawn';
  if (s.includes('pest')) return 'svc-pest';
  if (s.includes('tree') || s.includes('shrub')) return 'svc-tree';
  if (s.includes('mosquito')) return 'svc-mosquito';
  if (s.includes('aquatic')) return 'svc-aquatic';
  if (s.includes('bare')) return 'svc-bare';
  if (s.includes('grub')) return 'svc-grub';
  return 'svc-lawn';
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// ══════════ API LAYER (Same pattern as LPP) ══════════
function api(payload, onSuccess, onError) {
  if (!API_URL) {
    // No API configured — use localStorage only
    if (onError) onError('No API URL configured. Using local storage only.');
    return;
  }
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' }, // Critical — no CORS preflight
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(t => {
    const d = JSON.parse(t);
    if (d.status === 'ok') onSuccess(d);
    else if (onError) onError(d.message || 'API error');
  })
  .catch(err => { if (onError) onError(err.message || 'Network error'); });
}

// ══════════ PERSISTENCE ══════════
function saveToCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(STATE)); } catch(e) {}
}

function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const cached = JSON.parse(raw);
      STATE.customers = cached.customers || [];
      STATE.services = cached.services || {};
      STATE.programs = cached.programs || (DEFAULT_PROGRAMS.map(p => ({...p})));
      STATE.customerPrograms = cached.customerPrograms || [];
      STATE.routes = cached.routes || [];
      STATE.products = cached.products || [];
      STATE.sheetData = cached.sheetData || [];
      STATE.ponds = cached.ponds || [];
      STATE.pondVisits = cached.pondVisits || [];
      STATE.lawnVisits = cached.lawnVisits || [];
      STATE.phcVisits = cached.phcVisits || [];
      STATE.soilSamples = cached.soilSamples || [];
      STATE.baitStations = cached.baitStations || [];
      STATE.sheetLastSync = cached.sheetLastSync || null;
    } else {
      STATE.programs = DEFAULT_PROGRAMS.map(p => ({...p, rounds: p.rounds.map(r => ({...r}))}));
    }
  } catch(e) {
    STATE.programs = DEFAULT_PROGRAMS.map(p => ({...p, rounds: p.rounds.map(r => ({...r}))}));
  }
}

function loadAll() {
  // Load from cache first for instant UI
  loadFromCache();
  renderCurrentPage();

  // Then try API
  api({ action: 'fpGetAll' },
    function(d) {
      // Merge customers from shared Customers tab
      if (d.customers) STATE.customers = d.customers;
      // Services from existing Services tab (JSON blob with product definitions)
      if (d.services) STATE.services = d.services;
      // FieldPro-specific data
      if (d.programs && d.programs.length) STATE.programs = d.programs;
      if (d.customerPrograms) STATE.customerPrograms = d.customerPrograms;
      if (d.routes) STATE.routes = d.routes;
      if (d.products) STATE.products = d.products;
      if (d.ponds) STATE.ponds = d.ponds;
      if (d.pondVisits) STATE.pondVisits = d.pondVisits;
      if (d.lawnVisits) STATE.lawnVisits = d.lawnVisits;
      if (d.phcVisits) STATE.phcVisits = d.phcVisits;
      if (d.soilSamples) STATE.soilSamples = d.soilSamples;
      if (d.baitStations) STATE.baitStations = d.baitStations;
      saveToCache();
      renderCurrentPage();
      document.getElementById('offline-banner').classList.remove('show');
      console.log('FieldPro loaded:', STATE.customers.length, 'customers,', Object.keys(STATE.services || {}).length, 'services');
    },
    function(err) {
      console.log('Using cached data:', err);
      document.getElementById('offline-banner').classList.add('show');
    }
  );
}

function saveState() {
  saveToCache();
  // Fire API save in background
  api({ action: 'fpSaveAll', data: {
    programs: STATE.programs,
    customerPrograms: STATE.customerPrograms,
    routes: STATE.routes,
    products: STATE.products,
    ponds: STATE.ponds,
    pondVisits: STATE.pondVisits,
    lawnVisits: STATE.lawnVisits,
    phcVisits: STATE.phcVisits,
    soilSamples: STATE.soilSamples,
    baitStations: STATE.baitStations,
  }}, function(){}, function(err){ console.warn('Save to API failed:', err); });
}

// ══════════ WORKBOARD ══════════
function getWorkboardItems() {
  const items = [];
  STATE.customerPrograms.forEach(cp => {
    const cust = STATE.customers.find(c => c.id === cp.customerId || c.ID === cp.customerId);
    if (!cust) return;
    cp.rounds.forEach((r, idx) => {
      if (r.status === 'completed' || r.status === 'skipped') return;
      const due = isDue(r.windowStart, r.windowEnd);
      const over = isOverdue(r.windowEnd);
      const upcoming = isUpcoming(r.windowStart);
      const custName = cust.Name || cust.name || '';
      const custAddr = cust.Address || cust.address || '';
      const custId = cust.ID || cust.id;
      const turfSqft = cust.SqFt_Lawn || cust.turfSqft || '';
      items.push({
        ...r, cpId:cp.id, roundIdx:idx, customerId:custId, customerName:custName,
        customerAddress:custAddr, turfSqft, programName:cp.programName,
        due, overdue:over, upcoming, sortKey: over?0:due?1:2,
        windowStartFull:windowToDate(r.windowStart), windowEndFull:windowToDate(r.windowEnd)
      });
    });
  });
  items.sort((a,b) => a.sortKey-b.sortKey || a.windowStartFull.localeCompare(b.windowStartFull) || a.customerName.localeCompare(b.customerName));
  return items;
}

function renderWorkboard() {
  const items = getWorkboardItems();
  // Also get completed counts per service for stats
  const allRounds = [];
  STATE.customerPrograms.forEach(cp => {
    cp.rounds.forEach(r => { allRounds.push(r); });
  });

  let filtered = items;
  if (filterService !== 'all') filtered = filtered.filter(i => i.serviceType === filterService);
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(i => i.customerName.toLowerCase().includes(s) || i.name.toLowerCase().includes(s) || i.serviceType.toLowerCase().includes(s));
  }

  const overdueItems = filtered.filter(i => i.overdue);
  const dueItems = filtered.filter(i => i.due && !i.overdue);
  const upcomingItems = filtered.filter(i => i.upcoming);

  // Per-service stats
  const svcStats = {};
  SERVICE_TYPES.forEach(s => { svcStats[s] = { total: 0, completed: 0, pending: 0 }; });
  STATE.customerPrograms.forEach(cp => {
    cp.rounds.forEach(r => {
      if (svcStats[r.serviceType]) {
        svcStats[r.serviceType].total++;
        if (r.status === 'completed') svcStats[r.serviceType].completed++;
        else if (r.status === 'pending') svcStats[r.serviceType].pending++;
      }
    });
  });

  document.getElementById('page-workboard').innerHTML = `
    <h1>Work Board</h1>
    <div class="stat-row">
      <div class="stat-box"><div class="label">Overdue</div><div class="value" style="color:var(--overdue)">${items.filter(i=>i.overdue).length}</div></div>
      <div class="stat-box"><div class="label">Due Now</div><div class="value" style="color:var(--accent)">${items.filter(i=>i.due).length}</div></div>
      <div class="stat-box"><div class="label">Upcoming</div><div class="value" style="color:var(--text-dim)">${items.filter(i=>i.upcoming).length}</div></div>
      <div class="stat-box"><div class="label">Customers</div><div class="value">${STATE.customers.length}</div></div>
    </div>
    ${(()=>{
      const pondAlerts = [];
      STATE.ponds.forEach(p => {
        if (p.active === false) return;
        const freq = p.visitFreqDays || 14;
        const visits = STATE.pondVisits.filter(v => v.pondId === p.id).sort((a,b) => (b.date||'').localeCompare(a.date||''));
        const lastVisit = visits[0];
        let status = '';
        if (!lastVisit) { status = 'overdue'; }
        else {
          const daysSince = Math.floor((new Date() - new Date(lastVisit.date)) / 86400000);
          if (daysSince >= freq + 3) status = 'overdue';
          else if (daysSince >= freq - 2) status = 'due';
        }
        if (status) pondAlerts.push({ pond: p, status, lastVisit });
      });
      if (!pondAlerts.length) return '';
      return '<div class="section-label" style="color:' + (pondAlerts.some(a=>a.status==='overdue') ? 'var(--overdue)' : 'var(--accent)') + '">🌊 Pond Visits (' + pondAlerts.length + ')</div>' +
        pondAlerts.map(a => '<div class="card clickable" onclick="pondDetailId=\'' + a.pond.id + '\';navigateTo(\'ponds\')" style="border-left:3px solid ' + (a.status==='overdue'?'var(--overdue)':'var(--accent)') + '"><div class="flex-row gap-10"><div style="font-size:20px">🌊</div><div style="flex:1"><div style="font-weight:700;font-size:14px">' + escHtml(a.pond.name) + '</div><div style="font-size:12px;color:var(--text-dim)">' + (a.lastVisit ? 'Last visit: ' + fmtDate(a.lastVisit.date) : 'No visits yet') + '</div></div><span class="badge" style="background:' + (a.status==='overdue'?'var(--danger-bg);color:var(--overdue)':'var(--accent-dim);color:var(--accent)') + '">' + (a.status==='overdue'?'Overdue':'Due Soon') + '</span></div></div>').join('');
    })()}
    <div class="search-bar"><input placeholder="Filter by customer, round, service..." value="${escHtml(searchTerm)}" oninput="searchTerm=this.value;renderWorkboard()"></div>
    <div class="filter-pills">
      <button class="${filterService==='all'?'active':''}" onclick="filterService='all';renderWorkboard()">All</button>
      ${SERVICE_TYPES.filter(s => svcStats[s].total > 0).map(s => {
        const st = svcStats[s];
        return `<button class="${filterService===s?'active':''}" onclick="filterService='${s}';renderWorkboard()">${s} <span style="opacity:.7;font-size:9px">${st.completed}/${st.total}</span></button>`;
      }).join('')}
    </div>
    ${overdueItems.length ? `<div class="section-label" style="color:var(--overdue)">⚠ Overdue (${overdueItems.length})</div>${overdueItems.map(i => workCardHtml(i,'overdue')).join('')}` : ''}
    ${dueItems.length ? `<div class="section-label" style="color:var(--accent)">● Due Now (${dueItems.length})</div>${dueItems.map(i => workCardHtml(i,'due')).join('')}` : ''}
    ${upcomingItems.length ? `<div class="section-label" style="color:var(--text-muted)">Upcoming (${upcomingItems.length})</div>${upcomingItems.slice(0,30).map(i => workCardHtml(i,'')).join('')}` : ''}
    ${filtered.length === 0 ? '<div class="card"><p style="color:var(--text-dim)">No pending work. Assign programs to customers to populate the work board.</p></div>' : ''}
  `;
}

function workCardHtml(item, statusClass) {

        <div class="flex-row gap-6 mb-8">

function completeRound(cpId, roundIdx) {
  const cp = STATE.customerPrograms.find(c => c.id === cpId);

  cp.rounds[roundIdx].status = 'completed';
  cp.rounds[roundIdx].completedDate = todayStr();
  saveState();
  renderCurrentPage();
}

function skipRound(cpId, roundIdx) {
  const cp = STATE.customerPrograms.find(c => c.id === cpId);
  if (!cp) return;
  cp.rounds[roundIdx].status = 'skipped';
  saveState();
  renderCurrentPage();
}

function undoCompleteRound(cpId, roundIdx) {
  const cp = STATE.customerPrograms.find(c => c.id === cpId);
  if (!cp) return;
  cp.rounds[roundIdx].status = 'pending';
  cp.rounds[roundIdx].completedDate = null;
  saveState();
  renderCurrentPage();
}

      <div class="card" style="margin-bottom:12px">

      return pv.slice(0,10).map(v=>'<div class="card" style="padding:10px"><div class="flex-between"><span style="font-weight:700;font-size:13px">'+fmtDateFull(v.date)+'</span><button class="btn ghost sm" onclick="if(confirm(\'Delete?\')){{STATE.phcVisits=STATE.phcVisits.filter(x=>x.id!==\''+v.id+'\');saveState();renderCurrentPage();}}" style="color:var(--danger)">✕</button></div><div style="font-size:12px;color:var(--text-dim);margin-top:4px">Health: '+escHtml(v.health||'—')+' · Pests: '+escHtml(v.pestSeverity||'—')+' · Disease: '+escHtml(v.diseaseSeverity||'—')+'</div>'+(v.pests?'<div style="font-size:11px;color:var(--warn);margin-top:2px">Pests: '+escHtml(v.pests)+'</div>':'')+(v.diseases?'<div style="font-size:11px;color:var(--danger);margin-top:2px">Diseases: '+escHtml(v.diseases)+'</div>':'')+(v.treatment?'<div style="font-size:11px;color:var(--accent);margin-top:2px">Tx: '+escHtml(v.treatment)+'</div>':'')+'</div>').join('');

function deleteCustomer(cid) {
  if (!confirm('Delete this customer and all their programs?')) return;
  STATE.customers = STATE.customers.filter(c => (c.ID||c.customerId||c.id) !== cid);
  STATE.customerPrograms = STATE.customerPrograms.filter(cp => cp.customerId !== cid);
  saveState();
  detailCustomerId = null;
  renderCustomers();
}

function removeCustomerProgram(cpId) {
  if (!confirm('Remove this program?')) return;
  STATE.customerPrograms = STATE.customerPrograms.filter(cp => cp.id !== cpId);
  saveState();
  renderCurrentPage();
}

function assignProgram(customerId, programId) {
  const prog = STATE.programs.find(p => p.id === programId);
  if (!prog) return;
  STATE.customerPrograms.push({
    id: uid(), customerId, programId, programName: prog.name, year: currentYear,
    rounds: prog.rounds.map(r => ({...r, status:'pending', completedDate:null}))
  });
  saveState();
  closeModal();
  renderCurrentPage();
}

// ══════════ PRODUCTS ══════════
function renderProducts() {
  // Build a flat list from the Services JSON blob (from LPP) + any FP_Products
  let allItems = [];

  // Parse LPP Services data — each service has a products array
  if (STATE.services && typeof STATE.services === 'object') {
    Object.keys(STATE.services).forEach(svcName => {
      const svc = STATE.services[svcName];
      if (svc.products && Array.isArray(svc.products)) {
        svc.products.forEach(p => {
          // Avoid duplicates by product name
          if (!allItems.find(x => x.name === p.product)) {
            allItems.push({
              id: 'svc-' + (p.product||'').replace(/\s+/g,'-').toLowerCase().slice(0,30),
              name: p.product || '',
              activeIngredient: p.activeIng || '',
              epaReg: p.epa || '',
              targetRate: p.rate || '',
              method: p.method || '',
              targetPest: p.targetPest || '',
              category: svcName.split(' - ')[0] || '',
              source: 'lpp',
            });
          }
        });
      }
    });
  }

  // Add any manually-added FP products
  STATE.products.forEach(p => {
    if (!allItems.find(x => x.name === p.name)) {
      allItems.push({ ...p, source: 'fp' });
    }
  });

  // Filter by search
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    allItems = allItems.filter(p => (p.name||'').toLowerCase().includes(s) || (p.activeIngredient||'').toLowerCase().includes(s) || (p.targetPest||'').toLowerCase().includes(s) || (p.category||'').toLowerCase().includes(s));
  }

  // Sort by name
  allItems.sort((a,b) => (a.name||'').localeCompare(b.name||''));

  document.getElementById('page-products').innerHTML = `
    <div class="flex-between mb-16">
      <h1 style="margin:0">Products & Chemicals <span style="font-size:15px;color:var(--text-dim);font-weight:500">(${allItems.length})</span></h1>
      <button class="btn primary" onclick="showProductForm()">+ Add Product</button>
    </div>
    <div class="search-bar"><input placeholder="Search products, ingredients, pests..." value="${escHtml(searchTerm)}" oninput="searchTerm=this.value;renderProducts()"></div>
    ${allItems.map(p => `
      <div class="card" style="margin-bottom:8px">
        <div class="flex-row gap-10">
          <div style="width:36px;height:36px;border-radius:8px;background:rgba(167,139,250,.1);color:#a78bfa;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px">🧪</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px">${escHtml(p.name)}</div>
            <div style="font-size:12px;color:var(--text-dim)">${p.epaReg && p.epaReg !== 'N/A' ? 'EPA# ' + escHtml(p.epaReg) + ' · ' : ''}${escHtml(p.activeIngredient||'')}</div>
            ${p.targetRate ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">Rate: ${escHtml(p.targetRate)}</div>` : ''}
            ${p.targetPest && p.targetPest !== 'N/A — Fertility' ? `<div style="font-size:11px;color:var(--text-muted)">Target: ${escHtml(p.targetPest)}</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <span class="badge" style="background:var(--bg-input);color:var(--text-dim);font-size:9px">${escHtml(p.category||'—')}</span>
            ${p.source === 'lpp' ? '<div style="font-size:9px;color:var(--text-muted);margin-top:4px">from LPP</div>' : ''}
          </div>
          ${p.source === 'fp' ? `<button class="btn ghost sm" onclick="showProductForm('${p.id}')">Edit</button><button class="btn danger sm" onclick="deleteProduct('${p.id}')">Del</button>` : ''}
        </div>
        ${p.method ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">${escHtml(p.method)}</div>` : ''}
      </div>
    `).join('')}
    ${allItems.length === 0 ? '<div class="card"><p style="color:var(--text-dim)">No products found. Your LPP Services data may still be loading.</p></div>' : ''}
  `;
}

function deleteProduct(id) {
  if (!confirm('Delete product?')) return;
  STATE.products = STATE.products.filter(p => p.id !== id);
  saveState();
  renderProducts();
}

// ══════════ ROUTES ══════════
function renderRoutes() {
  const el = document.getElementById('page-routes');

  if (detailRouteId) {
    renderRouteDetail(el);
    return;
  }

  el.innerHTML = `
    <div class="flex-between mb-16">
      <h1 style="margin:0">Routes</h1>
      <button class="btn primary" onclick="showBuildRoute()">+ Build Route</button>
    </div>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Plan your daily routes. Select due work, optimize the order, then work the route.</p>
    ${STATE.routes.sort((a,b) => (a.date||'').localeCompare(b.date||'')).map(rt => {
      const completed = rt.stops?.filter(s => s.status === 'completed').length || 0;
      const total = rt.stops?.length || 0;
      const allDone = completed === total && total > 0;
      return `
        <div class="card clickable" onclick="detailRouteId='${rt.id}';renderRoutes()">
          <div class="flex-row gap-10">
            <div style="width:40px;height:40px;border-radius:8px;background:${allDone ? 'var(--accent-dim)' : rt.date===todayStr() ? 'var(--warn-bg)' : 'var(--bg-input)'};color:${allDone ? 'var(--accent)' : rt.date===todayStr() ? 'var(--warn)' : 'var(--text-dim)'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0">
              ${allDone ? '✓' : completed > 0 ? completed + '/' + total : total}
            </div>
            <div style="flex:1">
              <div style="font-weight:700;font-size:14px">${escHtml(rt.name || fmtDateFull(rt.date))}</div>
              <div style="font-size:12px;color:var(--text-dim)">${total} stops · ${escHtml(rt.serviceFilter||'Mixed')}${rt.date === todayStr() ? ' · Today' : ''}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono)">${fmtDate(rt.date)}</div>
              <span class="badge" style="background:${allDone ? 'var(--accent-dim)' : completed > 0 ? 'var(--warn-bg)' : 'var(--bg-input)'};color:${allDone ? 'var(--accent)' : completed > 0 ? 'var(--warn)' : 'var(--text-dim)'}">${allDone ? 'Done' : completed > 0 ? 'In Progress' : 'Planned'}</span>
            </div>
          </div>
        </div>
      `;
    }).join('')}
    ${STATE.routes.length === 0 ? '<div class="card"><p style="color:var(--text-dim)">No routes yet. Click "Build Route" to plan your day.</p></div>' : ''}
  `;
}

function renderRouteDetail(el) {
  const rt = STATE.routes.find(r => r.id === detailRouteId);
  if (!rt) { el.innerHTML = '<p>Route not found.</p>'; return; }
  const completed = rt.stops?.filter(s => s.status === 'completed').length || 0;
  const total = rt.stops?.length || 0;
  const pct = total ? Math.round((completed/total)*100) : 0;

  el.innerHTML = `
    <button class="btn ghost sm" onclick="detailRouteId=null;renderRoutes()" style="margin-bottom:14px">← Back</button>
    <div class="flex-between mb-16" style="flex-wrap:wrap;gap:10px">
      <div>
        <h1 style="margin:0">${escHtml(rt.name || fmtDateFull(rt.date))}</h1>
        <div style="font-size:13px;color:var(--text-dim)">${total} stops · ${completed} completed · ${escHtml(rt.serviceFilter||'Mixed')}</div>
      </div>
      <div class="flex-row gap-6" style="flex-wrap:wrap">
        <button class="btn primary sm" onclick="openInAppleMaps('${rt.id}')">🗺️ Maps</button>
        <button class="btn secondary sm" onclick="showEditRoute('${rt.id}')">✏️ Edit</button>
        <button class="btn danger sm" onclick="deleteRoute('${rt.id}')">Delete</button>
      </div>
    </div>
    <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
    ${rt.stops?.map((s,i) => `
      <div class="card stop-card ${s.status === 'completed' ? 'completed' : ''}" style="opacity:${s.status === 'completed' ? '.65' : '1'}">
        <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
          <button class="btn ghost sm" onclick="moveRouteStop('${rt.id}',${i},-1)" ${i===0?'disabled':''} style="padding:2px 4px;font-size:10px">▲</button>
          <button class="btn ghost sm" onclick="moveRouteStop('${rt.id}',${i},1)" ${i===total-1?'disabled':''} style="padding:2px 4px;font-size:10px">▼</button>
        </div>
        <div class="stop-num" style="background:${s.status === 'completed' ? 'var(--accent-dim)' : 'var(--bg-input)'};color:${s.status === 'completed' ? 'var(--accent)' : 'var(--text)'}">${s.status === 'completed' ? '✓' : i + 1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;margin-bottom:2px">${escHtml(s.customerName)}</div>
          <div style="font-size:12px;color:var(--text-dim)">${escHtml(s.address||'No address')}</div>
          <div style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px">${escHtml(s.roundName)} · ${escHtml(s.serviceType)}</div>
        </div>
        <div class="flex-row gap-6" style="flex-shrink:0">
          ${s.status !== 'completed' ? `<button class="btn success sm" onclick="completeRouteStop('${rt.id}',${i})">✓ Done</button>` : `<button class="btn ghost sm" onclick="undoRouteStop('${rt.id}',${i})">Undo</button>`}
          <button class="btn ghost sm" onclick="removeRouteStop('${rt.id}',${i})" style="color:var(--danger)" title="Remove stop">✕</button>
        </div>
      </div>
    `).join('')}
  `;
}

function completeRouteStop(routeId, stopIdx) {
  const rt = STATE.routes.find(r => r.id === routeId);
  if (!rt) return;
  rt.stops[stopIdx].status = 'completed';
  rt.stops[stopIdx].completedDate = todayStr();
  // Also complete the underlying round
  const stop = rt.stops[stopIdx];
  if (stop.cpId && stop.roundIdx != null) {

function moveRouteStop(routeId, idx, dir) {

function openInAppleMaps(routeId) {
  const rt = STATE.routes.find(r => r.id === routeId);
  if (!rt || !rt.stops || rt.stops.length === 0) { alert('No stops in this route.'); return; }
  // Get pending stops with addresses
  const pendingStops = rt.stops.filter(s => s.status !== 'completed' && s.address && s.address.trim().length > 5);
  if (pendingStops.length === 0) {
    // Try all stops (including completed)
    const allWithAddr = rt.stops.filter(s => s.address && s.address.trim().length > 5);
    if (allWithAddr.length === 0) {
      alert('No stops have addresses. Update customer addresses in the Customers tab first, then rebuild the route.');
      return;
    }
    if (!confirm(allWithAddr.length + ' stops have addresses but all are completed. Open them in Maps anyway?')) return;
    const url = 'https://www.google.com/maps/dir/' + allWithAddr.map(s => encodeURIComponent(s.address)).join('/');
    window.open(url, '_blank');
    return;
  }
  // Get current GPS location as start point, then open Maps
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      const start = pos.coords.latitude + ',' + pos.coords.longitude;
      const url = 'https://www.google.com/maps/dir/' + start + '/' + pendingStops.map(s => encodeURIComponent(s.address)).join('/');
      window.open(url, '_blank');
    }, function() {
      // GPS failed — open without start point
      const url = 'https://www.google.com/maps/dir/' + pendingStops.map(s => encodeURIComponent(s.address)).join('/');
      window.open(url, '_blank');
    }, { enableHighAccuracy: true, timeout: 5000 });
  } else {
    const url = 'https://www.google.com/maps/dir/' + pendingStops.map(s => encodeURIComponent(s.address)).join('/');
    window.open(url, '_blank');
  }
}

function renderSync() {
  const settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
  // Auto-fill sync URL from API_URL if not set
  const syncUrl = settings.syncUrl || API_URL || '';
  document.getElementById('page-sync').innerHTML = `
    <h1>Treatment Sync</h1>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Sync your LPP App Log to automatically verify and complete treatments in FieldPro.</p>
    <div class="card mb-16">
      <div class="section-label" style="margin-top:0">🔗 LPP App Log Sync</div>
      <div class="input-group"><label>API URL</label><input id="sync-url" value="${escHtml(syncUrl)}" placeholder="https://script.google.com/macros/s/.../exec"></div>
      <div style="margin-bottom:12px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="sync-all" ${settings.syncAll ? 'checked' : ''} style="width:16px;height:16px;accent-color:var(--accent)">
          <span style="font-weight:600">Fetch all months</span>
          <span style="font-size:11px;color:var(--text-muted)">(uncheck for current + last month only)</span>
        </label>
      </div>
      <button class="btn primary" onclick="doSync()" style="width:100%;padding:14px;font-size:15px">🔄 Sync Now</button>
      ${STATE.sheetLastSync ? `<div style="font-size:11px;color:var(--text-muted);margin-top:8px">Last sync: ${new Date(STATE.sheetLastSync).toLocaleString()} · ${STATE.sheetData.length} records</div>` : ''}
    </div>
    <div class="card mb-16">
      <div class="section-label" style="margin-top:0">📄 Manual CSV Upload</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Or upload a CSV export from your LPP Sheet.</p>
      <input type="file" accept=".csv" onchange="handleCsvUpload(this)" style="font-size:13px">
    </div>
    <div id="sync-results"></div>
  `;
  if (STATE.sheetData.length > 0) renderSyncResults();
}

function doSync() {
  const url = document.getElementById('sync-url')?.value?.trim();
  const fetchAll = document.getElementById('sync-all')?.checked;
  if (!url) { alert('Enter your Apps Script URL first.'); return; }

  // Save settings
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({ syncUrl: url, syncAll: fetchAll }));

  // Use POST with fpSyncLog action (same CORS-safe pattern as LPP)
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'fpSyncLog', fetchAll: fetchAll })
  })
    .then(r => r.text())
    .then(t => {
      const json = JSON.parse(t);
      if (json.status !== 'ok') { alert('API error: ' + (json.message||json.error||'Unknown')); return; }
      STATE.sheetData = json.records || [];
      STATE.sheetLastSync = json.synced || new Date().toISOString();

      // Auto-complete matching rounds
      let autoCompleted = 0;
      STATE.sheetData.forEach(row => {
        const custId = (row['Customer']||'').trim();
        const sheetDate = (row['Date']||'').trim();
        const sheetService = (row['Service']||'').trim();
        const fpCust = STATE.customers.find(c => (c.ID||c.customerId||'').toString() === custId);
        if (!fpCust) return;
        const fpCustId = fpCust.ID || fpCust.customerId || fpCust.id;
        let bestMatch = null, bestScore = 0;
        STATE.customerPrograms.forEach(cp => {
          if (cp.customerId !== fpCustId) return;
          cp.rounds.forEach((r, rIdx) => {
            if (r.status !== 'pending') return;
            let score = 0;
            const svcL = r.serviceType.toLowerCase();
            const sheetSvcL = sheetService.toLowerCase();
            if (svcL.includes(sheetSvcL.slice(0,4)) || sheetSvcL.includes(svcL.slice(0,4))) score += 2;
            if (sheetDate) {
              if (sheetDate >= windowToDate(r.windowStart) && sheetDate <= windowToDate(r.windowEnd)) score += 3;
            }
            score += 1;
            if (score > bestScore) { bestScore = score; bestMatch = { cpId:cp.id, roundIdx:rIdx, date:sheetDate }; }
          });
        });
        if (bestMatch && bestScore >= 4) {
          completeRound(bestMatch.cpId, bestMatch.roundIdx);
          autoCompleted++;
        }
      });

      saveState();
      renderSync();
      if (autoCompleted > 0) alert('Synced! Auto-completed ' + autoCompleted + ' rounds.');
      else alert('Synced ' + STATE.sheetData.length + ' records. No new rounds to auto-complete.');
    })
    .catch(err => alert('Failed to connect: ' + err.message));
}

function handleCsvUpload(input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) { alert('No data found.'); return; }
    const parseLine = (line) => { const r=[]; let c='',q=false; for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;} r.push(c.trim()); return r; };
    const hdrs = parseLine(lines[0]);
    const rows = lines.slice(1).map(l => { const v=parseLine(l); const o={}; hdrs.forEach((h,i)=>{o[h]=v[i]||'';}); return o; }).filter(r => Object.values(r).some(v=>v));
    STATE.sheetData = rows;
    STATE.sheetLastSync = new Date().toISOString();
    saveState();
    renderSync();
  };
  reader.readAsText(file);
}

function renderSyncResults() {
  // Basic stats display
  const el = document.getElementById('sync-results');
  if (!el) return;
  el.innerHTML = `
    <div class="stat-row">
      <div class="stat-box"><div class="label">Records</div><div class="value">${STATE.sheetData.length}</div></div>
    </div>
    <p style="font-size:13px;color:var(--text-dim)">Last sync pulled ${STATE.sheetData.length} treatment records. Matching rounds have been auto-completed.</p>
  `;
}

// ══════════ HISTORY ══════════
function renderHistory() {
  let completed = [];
  STATE.customerPrograms.forEach(cp => {
    const cust = STATE.customers.find(c => (c.ID||c.customerId||c.id) === cp.customerId);
    cp.rounds.forEach((r, idx) => {
      if (r.status !== 'completed' && r.status !== 'skipped') return;
      if (searchTerm) {
        const s = searchTerm.toLowerCase();
        const name = (cust?.Name||cust?.name||'').toLowerCase();
        if (!name.includes(s) && !r.name.toLowerCase().includes(s) && !(r.serviceType||'').toLowerCase().includes(s)) return;
      }
      // Check if this was synced from LPP
      const custId = (cust?.ID||cust?.customerId||'').toString();
      const isSynced = STATE.sheetData.some(row => {
        const sheetCust = (row['Customer']||'').trim();
        return sheetCust === custId;
      });
      completed.push({ ...r, cpId: cp.id, roundIdx: idx, customerName: cust?.Name||cust?.name||'?', programName: cp.programName, isSynced });
    });
  });
  completed.sort((a,b) => (b.completedDate||'z').localeCompare(a.completedDate||'z'));

  const syncedCount = completed.filter(r => r.isSynced).length;
  const unsyncedCount = completed.filter(r => !r.isSynced && r.status === 'completed').length;

  document.getElementById('page-history').innerHTML = `
    <h1>Completed Jobs</h1>
    <div class="stat-row">
      <div class="stat-box"><div class="label">Total Completed</div><div class="value" style="color:var(--accent)">${completed.filter(r=>r.status==='completed').length}</div></div>
      <div class="stat-box"><div class="label">Skipped</div><div class="value" style="color:var(--text-muted)">${completed.filter(r=>r.status==='skipped').length}</div></div>
      <div class="stat-box"><div class="label">LPP Verified</div><div class="value" style="color:var(--accent)">${syncedCount}</div></div>
      <div class="stat-box"><div class="label">Not in LPP Log</div><div class="value" style="color:${unsyncedCount > 0 ? 'var(--warn)' : 'var(--text-dim)'}">${unsyncedCount}</div></div>
    </div>
    <div class="search-bar"><input placeholder="Filter by customer, round, service..." value="${escHtml(searchTerm)}" oninput="searchTerm=this.value;renderHistory()"></div>
    ${completed.slice(0,100).map(r => `
      <div class="card" style="padding:10px;border-left:3px solid ${r.status==='completed' ? (r.isSynced ? 'var(--accent)' : 'var(--warn)') : 'var(--text-muted)'}">
        <div class="flex-row gap-10">
          <div style="font-size:14px;color:${r.status==='completed'?'var(--accent)':'var(--text-muted)'}">${r.status==='completed'?'✓':'—'}</div>
          <div style="min-width:70px;font-size:12px;color:var(--text-muted);font-family:var(--font-mono)">${fmtDate(r.completedDate)}</div>
          <div style="flex:1"><span style="font-weight:600">${escHtml(r.customerName)}</span><span style="color:var(--text-dim);font-size:13px"> — ${escHtml(r.name)}</span></div>
          <span class="badge ${svcColorClass(r.serviceType)}" style="font-size:9px">${escHtml(r.serviceType)}</span>
          ${r.status === 'completed' && r.isSynced ? '<span class="badge" style="background:var(--accent-dim);color:var(--accent);font-size:9px">LPP ✓</span>' : ''}
          ${r.status === 'completed' && !r.isSynced ? '<span class="badge" style="background:var(--warn-bg);color:var(--warn);font-size:9px">No LPP Record</span>' : ''}
          <button class="btn ghost sm" onclick="undoCompleteRound('${r.cpId}',${r.roundIdx})" title="Undo — mark as pending">↩️</button>
        </div>
      </div>
    `).join('')}
    ${completed.length === 0 ? '<div class="card"><p style="color:var(--text-dim)">No completed jobs yet.</p></div>' : ''}
    ${completed.length > 100 ? '<div style="text-align:center;padding:10px;color:var(--text-muted);font-size:12px">Showing first 100 of ' + completed.length + '</div>' : ''}
  `;
}

// ── Build Route Modal ──
function showBuildRoute() {
  window._brAllItems = getWorkboardItems();
  window._brFilter = { svc: 'all', status: 'due', round: 'all' };
  renderBuildRouteModal();
}

function renderBuildRouteModal() {
  const allItems = window._brAllItems;
  const f = window._brFilter;

  let items = allItems;
  if (f.status === 'due') items = items.filter(i => i.due || i.overdue);
  else if (f.status === 'overdue') items = items.filter(i => i.overdue);
  if (f.svc !== 'all') items = items.filter(i => i.serviceType === f.svc);
  if (f.round !== 'all') items = items.filter(i => i.name === f.round);

  // Get unique service types and round names from all items
  const uniqueSvcs = [...new Set(allItems.map(i => i.serviceType))];
  const uniqueRounds = [...new Set(items.map(i => i.name))].sort();

  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr = document.getElementById('br-date')?.value || tomorrow.toISOString().split('T')[0];

  showModal('Build Route — Select Stops', `
    <div class="flex-row gap-10 mb-16" style="flex-wrap:wrap;align-items:flex-end">
      <div class="input-group" style="min-width:140px"><label>Route Date</label><input type="date" id="br-date" value="${tomorrowStr}"></div>
      <div class="input-group" style="min-width:140px"><label>Status</label>
        <select id="br-status" onchange="window._brFilter.status=this.value;renderBuildRouteModal()">
          <option value="due" ${f.status==='due'?'selected':''}>Due + Overdue</option>
          <option value="overdue" ${f.status==='overdue'?'selected':''}>Overdue Only</option>
          <option value="all" ${f.status==='all'?'selected':''}>All Pending</option>
        </select>
      </div>
      <div class="input-group" style="min-width:160px"><label>Service Type</label>
        <select id="br-svc" onchange="window._brFilter.svc=this.value;window._brFilter.round='all';renderBuildRouteModal()">
          <option value="all">All Services</option>
          ${uniqueSvcs.map(s => `<option value="${s}" ${f.svc===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="input-group" style="min-width:200px"><label>Round</label>
        <select id="br-round" onchange="window._brFilter.round=this.value;renderBuildRouteModal()">
          <option value="all">All Rounds</option>
          ${uniqueRounds.map(r => `<option value="${escHtml(r)}" ${f.round===r?'selected':''}>${escHtml(r)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="flex-between mb-8">
      <span style="font-size:13px;color:var(--text-dim)">${items.length} matching · <strong style="color:var(--accent)">${items.length}</strong> shown</span>
      <button class="btn ghost sm" onclick="document.querySelectorAll('.br-check').forEach(c=>c.checked=!c.checked)">Toggle All</button>
    </div>
    <div style="max-height:350px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:16px">
      ${items.map((item,i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)">
          <input type="checkbox" class="br-check" data-idx="${i}" checked style="width:18px;height:18px;accent-color:var(--accent)">
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${escHtml(item.customerName)}</div>
            <div style="font-size:11px;color:var(--text-dim)">${escHtml(item.customerAddress||'No address')}</div>
            <div style="font-size:10px;color:var(--text-muted)">${escHtml(item.name)}</div>
          </div>
          <span class="badge ${svcColorClass(item.serviceType)}" style="font-size:9px">${escHtml(item.serviceType)}</span>
          ${item.overdue ? '<span class="badge" style="background:var(--danger-bg);color:var(--overdue);font-size:9px">Overdue</span>' : ''}
        </div>
      `).join('')}
      ${items.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text-dim)">No work matching these filters.</div>' : ''}
    </div>
    <div class="flex-row gap-6" style="justify-content:flex-end">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="buildRouteFromSelection()">Build Route</button>
    </div>
  `, true);

  window._brItems = items;
}

function buildRouteFromSelection() {
  const checks = document.querySelectorAll('.br-check:checked');
  const date = document.getElementById('br-date').value;
  const stops = [];

  checks.forEach(chk => {
    const idx = parseInt(chk.dataset.idx);
    const item = window._brItems[idx];
    if (!item) return;
    stops.push({
      customerId: item.customerId, customerName: item.customerName,
      address: item.customerAddress || '', cpId: item.cpId, roundIdx: item.roundIdx,
      roundName: item.name, serviceType: item.serviceType, status: 'pending'
    });
  });

  if (stops.length === 0) { alert('Select at least one stop.'); return; }

  // Sort by zip code proximity
  stops.sort((a,b) => {
    const zipA = (a.address.match(/(\d{5})/) || ['','99999'])[1];
    const zipB = (b.address.match(/(\d{5})/) || ['','99999'])[1];
    return zipA.localeCompare(zipB) || a.address.localeCompare(b.address);
  });

  const route = {
    id: uid(), name: fmtDate(date) + ' Route', date, serviceFilter: 'Mixed',
    stops, createdAt: todayStr()
  };
  STATE.routes.push(route);
  saveState();
  closeModal();
  detailRouteId = route.id;
  navigateTo('routes');
}

function captureGPS() {
  document.getElementById('gps-status').textContent = 'Getting location...';
  if (!navigator.geolocation) { document.getElementById('gps-status').textContent = 'GPS not available'; return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    document.getElementById('bs-lat').value = pos.coords.latitude.toFixed(6);
    document.getElementById('bs-lng').value = pos.coords.longitude.toFixed(6);
    document.getElementById('gps-status').textContent = '✓ Location captured';
    document.getElementById('gps-status').style.color = 'var(--accent)';
  }, function(err) {
    document.getElementById('gps-status').textContent = 'GPS error: ' + err.message;
    document.getElementById('gps-status').style.color = 'var(--danger)';
  }, { enableHighAccuracy: true });
}

function saveBaitStation(customerId) {
  const label = document.getElementById('bs-label').value.trim();
  if (!label) { alert('Label required.'); return; }
  const station = {
    id: uid(), customerId, label,
    lat: parseFloat(document.getElementById('bs-lat').value) || null,
    lng: parseFloat(document.getElementById('bs-lng').value) || null,
    installDate: document.getElementById('bs-date').value,
    notes: document.getElementById('bs-notes').value,
    serviceDates: [],
  };
  STATE.baitStations.push(station);
  saveState(); closeModal(); renderCurrentPage();
}

function serviceBaitStation(stationId) {
  const st = STATE.baitStations.find(s => s.id === stationId);
  if (!st) return;
  st.serviceDates.push(todayStr());
  saveState(); renderCurrentPage();
}

function deleteBaitStation(stationId) {
  if (!confirm('Delete this station?')) return;
  STATE.baitStations = STATE.baitStations.filter(s => s.id !== stationId);
  saveState(); renderCurrentPage();
}

function renderBaitStationMap(containerId, stations) {
  setTimeout(function() {
    const container = document.getElementById(containerId);
    if (!container || !window.L) return;
    const validStations = stations.filter(s => s.lat && s.lng);
    if (!validStations.length) { container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim)">No stations with GPS coordinates yet.</div>'; return; }
    container.innerHTML = '';
    const map = L.map(containerId).setView([validStations[0].lat, validStations[0].lng], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(map);
    validStations.forEach(function(s) {
      L.marker([s.lat, s.lng]).addTo(map).bindPopup('<strong>' + s.label + '</strong><br>Installed: ' + (s.installDate||'?') + '<br>Services: ' + (s.serviceDates?.length||0));
    });
    if (validStations.length > 1) {
      const bounds = L.latLngBounds(validStations.map(s => [s.lat, s.lng]));
      map.fitBounds(bounds, { padding: [30, 30] });
    }
  }, 200);
}

  if (!stations.length) return '<div class="card"><p style="color:var(--text-dim)">No bait stations. Click "+ Bait Station" above.</p></div>';
  const mapId = 'bsmap-' + customerId.toString().replace(/[^a-z0-9]/gi, '');

    <div class="card" style="padding:10px;margin-bottom:6px">

// ══════════ GEOCODING ══════════
function geocodeCustomer(customerId) {
  const cust = STATE.customers.find(c => (c.ID||c.customerId||c.id) === customerId);
  if (!cust) { alert('Customer not found.'); return; }
  const addr = cust.Address || cust.address || '';
  if (!addr || addr.trim().length < 5) { alert('No address found for this customer. Add an address first.'); return; }
  
  // Show loading
  const btn = event?.target;
  if (btn) { btn.textContent = '⏳ Looking up...'; btn.disabled = true; }
  
  // Use Nominatim (free OpenStreetMap geocoder)
  const q = encodeURIComponent(addr);
  fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + q, {
    headers: { 'User-Agent': 'FieldPro-LPP/1.0' }
  })
  .then(r => r.json())
  .then(results => {
    if (results && results.length > 0) {
      const lat = parseFloat(results[0].lat);
      const lng = parseFloat(results[0].lon);
      // Store coordinates on the customer
      cust.Lat = lat;
      cust.Lng = lng;
      saveState();
      if (btn) { btn.textContent = '✓ Located'; btn.style.color = 'var(--accent)'; }
      alert('Location found: ' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '\nAddress matched: ' + results[0].display_name);
      renderCurrentPage();
    } else {
      if (btn) { btn.textContent = '✕ Not found'; btn.style.color = 'var(--danger)'; btn.disabled = false; }
      alert('Could not find GPS coordinates for:\n' + addr + '\n\nTry updating the address to be more specific (include city, state, zip).');
    }
  })
  .catch(err => {
    if (btn) { btn.textContent = '📍 Geocode'; btn.disabled = false; }
    alert('Geocoding error: ' + err.message);
  });
}

function geocodeAllCustomers() {
  const withAddr = STATE.customers.filter(c => {
    const addr = c.Address || c.address || '';
    const hasCoords = c.Lat && c.Lng;
    return addr.trim().length > 5 && !hasCoords;
  });
  
  if (!withAddr.length) { alert('All customers with addresses are already geocoded.'); return; }
  if (!confirm('Geocode ' + withAddr.length + ' customers without GPS coordinates?\n\nThis uses the free OpenStreetMap service and may take about ' + Math.ceil(withAddr.length * 1.1) + ' seconds due to rate limits (1 request/second).')) return;
  
  let idx = 0;
  let success = 0;
  let failed = 0;
  const statusEl = document.getElementById('geocode-status');
  
  function doNext() {
    if (idx >= withAddr.length) {
      if (statusEl) statusEl.textContent = 'Done! ' + success + ' geocoded, ' + failed + ' failed.';
      saveState();
      renderCurrentPage();
      return;
    }
    const cust = withAddr[idx];
    const addr = cust.Address || cust.address || '';
    if (statusEl) statusEl.textContent = 'Geocoding ' + (idx+1) + '/' + withAddr.length + ': ' + (cust.Name||cust.name||'');
    
    const q = encodeURIComponent(addr);
    fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + q, {
      headers: { 'User-Agent': 'FieldPro-LPP/1.0' }
    })
    .then(r => r.json())
    .then(results => {
      if (results && results.length > 0) {
        cust.Lat = parseFloat(results[0].lat);
        cust.Lng = parseFloat(results[0].lon);
        success++;
      } else {
        failed++;
      }
      idx++;
      setTimeout(doNext, 1100); // Nominatim rate limit: 1 req/sec
    })
    .catch(() => { failed++; idx++; setTimeout(doNext, 1100); });
  }
  
  doNext();
}

function captureCustomerGPS(customerId) {
  if (!navigator.geolocation) { alert('GPS not available'); return; }
  const btn = event?.target;
  if (btn) { btn.textContent = '⏳ Getting GPS...'; btn.disabled = true; }
  
  navigator.geolocation.getCurrentPosition(function(pos) {
    const cust = STATE.customers.find(c => (c.ID||c.customerId||c.id) === customerId);
    if (!cust) return;
    cust.Lat = pos.coords.latitude;
    cust.Lng = pos.coords.longitude;
    saveState();
    if (btn) { btn.textContent = '✓ GPS Captured'; btn.style.color = 'var(--accent)'; }
    renderCurrentPage();
  }, function(err) {
    if (btn) { btn.textContent = '📍 Use GPS'; btn.disabled = false; }
    alert('GPS error: ' + err.message);
  }, { enableHighAccuracy: true });
}

function renderPonds() {
  const el = document.getElementById('page-ponds');

  if (pondVisitView === 'new' && pondDetailId) {
    renderPondChecklist(el);
    return;
  }
  if (pondDetailId) {
    renderPondDetail(el);
    return;
  }

  // Pond list view
  el.innerHTML = `
    <div class="flex-between mb-16">
      <h1 style="margin:0">Pond Management <span style="font-size:15px;color:var(--text-dim);font-weight:500">(${STATE.ponds.length})</span></h1>
      <button class="btn primary" onclick="showPondForm()">+ Add Pond</button>
    </div>
    ${STATE.ponds.map(p => {
      const visits = STATE.pondVisits.filter(v => v.pondId === p.id);
      const lastVisit = visits.sort((a,b) => (b.date||'').localeCompare(a.date||''))[0];
      return `
        <div class="card clickable" onclick="pondDetailId='${p.id}';renderPonds()">
          <div class="flex-row gap-10">
            <div style="width:40px;height:40px;border-radius:8px;background:rgba(56,189,248,.15);color:#38bdf8;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🌊</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:14px">${escHtml(p.name)}</div>
              <div style="font-size:12px;color:var(--text-dim)">${escHtml(p.location||'')} · ${p.sizeAcres ? p.sizeAcres + ' acres' : 'Size not set'}</div>
              <div style="font-size:11px;color:var(--text-muted)">${visits.length} visits${lastVisit ? ' · Last: ' + fmtDate(lastVisit.date) : ''}${p.active===false ? ' · <span style="color:var(--text-muted)">Inactive</span>' : ''}</div>
              ${(()=>{
                if (p.active === false) return '';
                const freq = p.visitFreqDays || 14;
                if (!lastVisit) return '<span class="badge" style="background:var(--danger-bg);color:var(--overdue);font-size:9px">No visits yet</span>';
                const lastDate = new Date(lastVisit.date);
                const now = new Date();
                const daysSince = Math.floor((now - lastDate) / 86400000);
                if (daysSince >= freq + 3) return '<span class="badge" style="background:var(--danger-bg);color:var(--overdue);font-size:9px">Overdue (' + daysSince + 'd)</span>';
                if (daysSince >= freq - 2) return '<span class="badge" style="background:var(--accent-dim);color:var(--accent);font-size:9px">Due soon</span>';
                return '<span class="badge" style="background:var(--bg-input);color:var(--text-muted);font-size:9px">' + (freq - daysSince) + 'd until next</span>';
              })()}
            </div>
            <div style="text-align:right">
              ${p.hoaContact ? `<div style="font-size:11px;color:var(--text-dim)">${escHtml(p.hoaContact)}</div>` : ''}
              ${lastVisit ? `<span class="badge" style="background:var(--accent-dim);color:var(--accent);font-size:9px">pH ${lastVisit.pH||'?'} · DO ${lastVisit.dissolvedOxygen||'?'}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('')}
    ${STATE.ponds.length === 0 ? '<div class="card"><p style="color:var(--text-dim)">No ponds yet. Add your first pond above.</p></div>' : ''}
  `;
}

function renderPondDetail(el) {
  const p = STATE.ponds.find(x => x.id === pondDetailId);
  if (!p) { el.innerHTML = '<p>Pond not found.</p>'; return; }
  const visits = STATE.pondVisits.filter(v => v.pondId === p.id).sort((a,b) => (b.date||'').localeCompare(a.date||''));

  // Get data for trend charts
  const chartVisits = [...visits].reverse(); // chronological order
  const chartLabels = chartVisits.map(v => fmtDate(v.date));
  const phData = chartVisits.map(v => parseFloat(v.pH) || null);
  const doData = chartVisits.map(v => parseFloat(v.dissolvedOxygen) || null);
  const tempData = chartVisits.map(v => parseFloat(v.waterTemp) || null);

  el.innerHTML = `
    <button class="btn ghost sm" onclick="pondDetailId=null;pondVisitView=null;renderPonds()" style="margin-bottom:14px">← Back to Ponds</button>

        <button class="btn secondary sm" onclick="showPondReport('${p.id}')">📄 Report</button>

    <!-- Trend Charts -->
    ${chartVisits.length >= 2 ? `
      <h2>Water Quality Trends</h2>
      <div class="stat-row">
        <div class="stat-box"><div class="label">Latest pH</div><div class="value" style="color:var(--accent)">${phData[phData.length-1] || '—'}</div></div>
        <div class="stat-box"><div class="label">Latest DO</div><div class="value" style="color:#38bdf8">${doData[doData.length-1] || '—'} <span style="font-size:11px;color:var(--text-dim)">mg/L</span></div></div>
        <div class="stat-box"><div class="label">Latest Temp</div><div class="value" style="color:#f59e0b">${tempData[tempData.length-1] || '—'}°F</div></div>
        <div class="stat-box"><div class="label">Total Visits</div><div class="value">${visits.length}</div></div>
      </div>
      <div class="trend-chart">
        <div style="font-size:12px;font-weight:700;color:var(--text-dim);margin-bottom:8px">pH / DO / Temp Over Time</div>
        <canvas id="pond-trend-canvas"></canvas>
      </div>
    ` : `
      <div class="stat-row">
        <div class="stat-box"><div class="label">Total Visits</div><div class="value">${visits.length}</div></div>
      </div>
      ${visits.length < 2 ? '<div class="card"><p style="color:var(--text-dim)">Complete at least 2 visits to see trend charts.</p></div>' : ''}
    `}

    <!-- Visit History -->
    <div class="flex-between" style="margin:18px 0 10px">
      <h2 style="margin:0">Visit History (${visits.length})</h2>
    </div>
    ${visits.map(v => `
      <div class="card" style="padding:12px">
        <div class="flex-between mb-8">
          <div>
            <span style="font-weight:700;font-size:14px">${fmtDateFull(v.date)}</span>
          </div>
          <div class="flex-row gap-6">
            <span class="badge" style="background:var(--accent-dim);color:var(--accent)">pH ${v.pH||'?'}</span>
            <span class="badge" style="background:rgba(56,189,248,.15);color:#38bdf8">DO ${v.dissolvedOxygen||'?'}</span>
            <span class="badge" style="background:rgba(245,158,11,.15);color:#f59e0b">${v.waterTemp||'?'}°F</span>
            <button class="btn ghost sm" onclick="showVisitDetail('${v.id}')" title="View details">👁</button>
            <button class="btn ghost sm" onclick="deletePondVisit('${v.id}')" style="color:var(--danger)" title="Delete">✕</button>
          </div>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text-dim)">
          <span>Clarity: ${escHtml(v.clarity||'—')}</span>
          <span>Algae: ${escHtml(v.algaePresence||'—')}</span>
          <span>Weeds: ${escHtml(v.weedPresence||'—')}</span>

        </div>

    ${visits.length === 0 ? '<div class="card"><p style="color:var(--text-dim)">No visits logged yet. Click "+ New Visit" to start your first checklist.</p></div>' : ''}
  `;

  // Draw chart if we have data
  if (chartVisits.length >= 2) {
    setTimeout(() => drawTrendChart('pond-trend-canvas', chartLabels, phData, doData, tempData), 100);
  }
}

// Quick-select helper
function qSelect(groupId, btn, value) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  btn.dataset.value = value;
}

function getQValue(groupId) {
  const sel = document.getElementById(groupId)?.querySelector('.selected');
  return sel ? sel.dataset.value || sel.textContent.trim() : '';
}

function savePondVisit(pondId) {
  const visit = {
    id: uid(),
    pondId: pondId,
    date: todayStr(),
    time: new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }),
    // Water Quality
    pH: document.getElementById('pc-ph')?.value || '',
    dissolvedOxygen: document.getElementById('pc-do')?.value || '',
    waterTemp: document.getElementById('pc-temp')?.value || '',
    clarity: getQValue('qs-clarity'),
    // Visual Assessment
    algaePresence: getQValue('qs-algae'),
    algaeType: getQValue('qs-algaetype'),
    weedPresence: getQValue('qs-weed'),
    weedSpecies: document.getElementById('pc-weedspecies')?.value || '',
    shorelineErosion: getQValue('qs-erosion'),
    bufferCondition: getQValue('qs-buffer'),
    // Infrastructure
    aerationStatus: getQValue('qs-aeration'),
    fountainStatus: getQValue('qs-fountain'),
    inletsOutlets: getQValue('qs-inlets'),
    debris: getQValue('qs-debris'),
    // Wildlife
    fishActivity: getQValue('qs-fish'),
    deadFish: getQValue('qs-deadfish'),
    waterfowlIssues: getQValue('qs-waterfowl'),
    // Treatments & Notes
    treatments: document.getElementById('pc-treatments')?.value || '',
    notes: document.getElementById('pc-notes')?.value || '',
  };

  // Handle photo
  const photoInput = document.getElementById('pc-photo');
  if (photoInput && photoInput.files && photoInput.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      visit.photo = e.target.result; // base64
      STATE.pondVisits.push(visit);
      saveState();
      pondVisitView = null;

// ── Simple Canvas Trend Chart ──
function drawTrendChart(canvasId, labels, phData, doData, tempData) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth - 28;
  const H = 200;
  canvas.width = W * 2; canvas.height = H * 2;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(2, 2);

  const pad = { top:20, right:20, bottom:30, left:40 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  // Combine all values to find range
  const allVals = [...phData, ...doData, ...tempData].filter(v => v !== null);
  if (allVals.length === 0) return;
  const minVal = Math.min(...allVals) * 0.9;
  const maxVal = Math.max(...allVals) * 1.1;
  const range = maxVal - minVal || 1;

  const xStep = labels.length > 1 ? cw / (labels.length - 1) : cw;

  // Grid lines
  ctx.strokeStyle = '#2a4a30';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#5a7a5e';
    ctx.font = '9px IBM Plex Mono';
    ctx.textAlign = 'right';
    ctx.fillText((maxVal - (range / 4) * i).toFixed(1), pad.left - 4, y + 3);
  }

  // X labels
  ctx.fillStyle = '#5a7a5e';
  ctx.font = '9px IBM Plex Mono';
  ctx.textAlign = 'center';
  labels.forEach((l, i) => {
    const x = pad.left + i * xStep;
    ctx.fillText(l, x, H - 8);
  });

  // Draw lines
  function drawLine(data, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    let started = false;
    data.forEach((v, i) => {
      if (v === null) return;
      const x = pad.left + i * xStep;
      const y = pad.top + ch - ((v - minVal) / range) * ch;
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    // Dots
    data.forEach((v, i) => {
      if (v === null) return;
      const x = pad.left + i * xStep;
      const y = pad.top + ch - ((v - minVal) / range) * ch;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
    });
  }

  drawLine(phData, '#4ade80');   // green = pH
  drawLine(doData, '#38bdf8');   // blue = DO
  drawLine(tempData, '#f59e0b'); // yellow = Temp

  // Legend
  const legendY = 10;
  [['pH','#4ade80'], ['DO','#38bdf8'], ['Temp','#f59e0b']].forEach(([label, color], i) => {
    const lx = pad.left + i * 60;
    ctx.fillStyle = color;
    ctx.fillRect(lx, legendY - 4, 12, 3);
    ctx.fillStyle = '#8aab8d';
    ctx.font = '9px IBM Plex Sans';
    ctx.textAlign = 'left';
    ctx.fillText(label, lx + 16, legendY);
  });
}

    <div class="input-group"><label>Treatment (product name)</label><input id="ge-tprod" placeholder="e.g., Diquat (Reward)"></div>
    <div class="input-group"><label>Active Ingredient</label><input id="ge-tai"></div>
    <div class="input-group"><label>Rate</label><input id="ge-trate"></div>
    <div class="input-group"><label>Treatment Notes</label><textarea id="ge-tnotes"></textarea></div>
    <div class="flex-row gap-6" style="justify-content:flex-end">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveGuideEntry()">Save</button>
    </div>
  `, true);
}

function saveGuideEntry() {
  const name = document.getElementById('ge-name').value.trim();
  if (!name) { alert('Name required.'); return; }
  const entry = {
    id: 'custom-' + uid(),
    category: document.getElementById('ge-cat').value,
    name: name,
    description: document.getElementById('ge-desc').value,
    idTips: document.getElementById('ge-tips').value,
    treatments: [],
  };
  const tprod = document.getElementById('ge-tprod').value.trim();
  if (tprod) {
    entry.treatments.push({
      product: tprod,
      activeIng: document.getElementById('ge-tai').value.trim(),
      rate: document.getElementById('ge-trate').value.trim(),
      notes: document.getElementById('ge-tnotes').value.trim(),
    });
  }
  const custom = JSON.parse(localStorage.getItem('fp_custom_guide') || '[]');
  custom.push(entry);
  localStorage.setItem('fp_custom_guide', JSON.stringify(custom));
  closeModal();
  renderAquaticId();
}

function deleteGuideEntry(id) {
  if (!confirm('Delete this custom entry?')) return;
  const custom = JSON.parse(localStorage.getItem('fp_custom_guide') || '[]');
  localStorage.setItem('fp_custom_guide', JSON.stringify(custom.filter(e => e.id !== id)));
  guideDetailId = null;
  renderAquaticId();
}

function doLogin() {
  const pin = document.getElementById('pin-input')?.value;
  if (pin === APP_PIN) {
    sessionStorage.setItem('fp_auth', 'true');
    document.getElementById('modal-container').innerHTML = '';
    document.getElementById('app').style.display = 'flex';
    loadAll();
  } else {
    const err = document.getElementById('pin-error');
    if (err) err.style.display = 'block';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
}

      document.getElementById('app').style.display = 'flex';
      if (!checkAuth()) {
        showLoginScreen();
      } else {
        loadAll();
      }
    }, 500);
  }, 1200);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
